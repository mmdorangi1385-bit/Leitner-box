  function icon(name, size){ return svgIcon(PATHS[name], size); }

  function render(){
    ensureDailyProgressFresh();
    document.getElementById('app').innerHTML = `
      <div class="wrap">
        <div class="app-header-row">
          <div class="header-menu-wrap">
            <button class="kebab-btn" onclick="toggleHeaderMenu()" aria-label="${t('menuMore')}">${icon('kebab',18)}</button>
            <button class="bell-btn" onclick="openRequestsModal()" aria-label="درخواست‌های دوستی">
              ${icon('bell',18)}
              ${state.friendRequests.length > 0 ? `<span class="bell-dot"></span>` : ''}
            </button>
            <button class="kebab-btn target-lang-btn" onclick="openTargetLangPicker()" aria-label="${t('targetLangBadgeAria')}" title="${targetLangLabel()}">${targetLangMeta(currentTargetLangCode()).flag}</button>
            ${state.showHeaderMenu ? `
              <div class="header-menu">
                <button class="header-menu-item" onclick="goProfile()">${icon('user',16)} ${t('menuProfile')}</button>
                <button class="header-menu-item" onclick="goStats()">${icon('chart',16)} ${t('menuStats')}</button>
                <button class="header-menu-item" onclick="goManage(); closeHeaderMenu();">${icon('archive',16)} ${t('menuManage')}</button>
                <button class="header-menu-item" onclick="goFriends(); closeHeaderMenu();">${icon('message',16)} ${t('menuChat')}</button>
                <button class="header-menu-item" onclick="goLeaderboard(); closeHeaderMenu();">🏆 نفرات برتر</button>
                <button class="header-menu-item" onclick="openStreakModal()">${icon('calendar',16)} ${t('menuStreak')}</button>
                <button class="header-menu-item" onclick="openLangPicker()">${icon('translate',16)} ${t('menuChangeLang')}</button>
              </div>
            ` : ''}
          </div>
          <div class="app-header-titles">
            <div class="app-title-glass">
              <h1 class="app-title">${t('appTitle')}</h1>
            </div>
          </div>
          <div class="app-header-icon-wrap"><img src="icon-header.png" alt="" class="app-header-icon"></div>
        </div>
        ${state.showHeaderMenu ? `<div class="menu-backdrop" onclick="closeHeaderMenu()"></div>` : ''}
        ${renderNav()}
        ${state.view==='home' ? renderHome() : state.view==='add' ? renderAdd() : state.view==='translate' ? renderTranslate() : state.view==='study' ? renderStudy() : state.view==='stats' ? renderStats() : state.view==='settings' ? renderSettings() : state.view==='profile' ? renderProfile() : state.view==='categoryHome' ? renderCategoryHome() : state.view==='friends' ? renderFriends() : state.view==='leaderboard' ? renderLeaderboardPage() : renderManage()}
        ${renderStreakModal()}
        ${renderLeagueModal()}
        ${renderLevelRoadmapModal()}
        ${renderLangPicker()}
        ${renderTargetLangPicker()}
        ${renderAvatarModal()}
        ${renderFriendProfileModal()}
        ${renderRequestsModal()}
        ${renderUserFriendProfileModal()}
      </div>
      ${!state.aiOpen ? renderAiFab() : ''}
      ${state.aiOpen ? renderAiPage() : ''}
      ${state.openChatUsername ? renderUserChatPage() : ''}
    `;
  }

  function toggleHeaderMenu(){ state.showHeaderMenu = !state.showHeaderMenu; render(); }
  function closeHeaderMenu(){ state.showHeaderMenu = false; render(); }

  function renderNav(){
    return `
      <div class="nav-row">
        <button class="nav-btn ${(state.view==='home'||state.view==='categoryHome')?'active':''}" onclick="goHome()">${icon('home',15)}${t('navHome')}</button>
        <button class="nav-btn ${state.view==='add'?'active':''}" onclick="goAdd()">${icon('plus',15)}${t('navAdd')}</button>
        <button class="nav-btn ${state.view==='translate'?'active':''}" onclick="goTranslate()">${icon('translate',15)}${t('navTranslate')}</button>
        <button class="nav-btn ${state.view==='study'?'active':''}" onclick="goStudyTab()">${icon('book',15)}${t('navStudy')}</button>
        <button class="nav-btn ${state.view==='profile'?'active':''}" onclick="goProfile()">${icon('user',15)}${t('navProfile')}</button>
        <button class="nav-btn ${state.view==='settings'?'active':''}" onclick="goSettings()">${icon('settings',15)}${t('navSettings')}</button>
      </div>
    `;
  }

  function renderHome(){
    const pronunCount = state.cards.filter(c => matchesCategory(c, state.studyCategoryFilter)).length;
    return `
      ${renderDailyGoalsPanel()}
      ${renderHomeChatChip()}
      ${renderCategoryQuickList()}
      ${renderDeckSection('word')}
      ${renderDeckSection('sentence')}
      ${renderPronunHomePanel(pronunCount)}
    `;
  }
  function renderHomeChatChip(){
    const onlineCount = FRIENDS.filter(f => f.online).length;
    return `
      <div class="panel" style="display:flex;align-items:center;gap:12px;cursor:pointer" onclick="goFriends()">
        <span style="width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--panel2);color:var(--brass);border:1px solid var(--border2)">${icon('message',20)}</span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:14px">${t('homeChatTitle')}</div>
          <div class="hint-text" style="margin-top:2px">${t('homeChatDesc')}</div>
        </div>
        ${onlineCount>0 ? `<span style="display:flex;align-items:center;gap:5px;background:rgba(63,161,90,0.12);color:var(--sage-strong);border:1px solid rgba(63,161,90,0.35);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;flex-shrink:0"><span style="width:7px;height:7px;border-radius:50%;background:var(--sage-strong);display:inline-block"></span>${faNum(onlineCount)}</span>` : ''}
      </div>
    `;
  }
  function renderCategoryQuickList(){
    if (state.categories.length === 0) return '';
    const today = todayStr();
    return `
      <div class="panel">
        <div class="deck-header"><span class="deck-title">${t('categoriesTitle')}</span><span class="deck-sub">${t('categoriesSub')}</span></div>
        <div class="category-carousel">
          ${state.categories.map(cat => {
            const count = state.cards.filter(c => c.categoryId === cat.id).length;
            const due = state.cards.filter(c => c.categoryId === cat.id && c.nextReview <= today).length;
            return `
              <div class="category-slide" onclick="openCategory('${cat.id}')">
                ${due>0 ? `<span class="category-slide-badge">${faNum(due)}</span>` : ''}
                <div class="category-slide-name">${esc(cat.name)}</div>
                <div class="category-slide-count">${tf('itemsCount', {n: faNum(count)})}</div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }
  function renderCategoryHome(){
    const cat = state.categories.find(c => c.id === state.activeCategoryId);
    if (!cat){ state.view = 'home'; return renderHome(); }
    const pronunCount = state.cards.filter(c => matchesCategory(c, cat.id)).length;
    return `
      <div class="panel" style="padding:0">
        <div class="category-header">
          <button class="category-back" onclick="closeCategory()">${icon('undo',18)}</button>
          <div class="category-header-text">
            <div class="deck-title">${esc(cat.name)}</div>
            <div class="deck-sub">${t('categoryBoxSub')}</div>
          </div>
        </div>
      </div>
      ${renderDeckSection('word')}
      ${renderDeckSection('sentence')}
      ${renderPronunHomePanel(pronunCount)}
    `;
  }
  function openCategory(id){
    state.activeCategoryId = id;
    state.studyCategoryFilter = id;
    state.view = 'categoryHome';
    render();
  }
  function closeCategory(){
    state.activeCategoryId = null;
    state.studyCategoryFilter = 'all';
    state.view = 'home';
    render();
  }
  function renderPronunHomePanel(count){
    return `
      <div class="panel">
        <div class="deck-header"><span class="deck-title" style="color:var(--teal)">${t('pronunTitle')}</span><span class="deck-sub">${tf('pronunCardsCount', {n: faNum(count)})}</span></div>
        <div class="hint-text">${tf('pronunHomeHint', {lang: targetLangLabel()})}</div>
        <button class="btn-primary pronun-cta" ${count===0?'disabled':''} onclick="startSession('pronun')">${icon('volume',18)} ${t('pronunStartBtn')}</button>
      </div>
    `;
  }

  function renderDeckSection(type){
    const colors = colorsFor(type);
    const catFilter = state.studyCategoryFilter;
    const bc = boxCountsFor(type, catFilter);
    const dc = dueCountFor(type, catFilter);
    const total = state.cards.filter(c=>c.type===type && matchesCategory(c, catFilter)).length;
    const title = type==='sentence' ? t('deckSentence') : t('deckWord');
    let drawers;
    if (total === 0){
      drawers = `<div class="empty-state" style="padding:18px 10px">${icon('archive',26)}<div>${tf('emptyDeck', {type: typeLabel(type)})}</div></div>`;
    } else {
      const today = todayStr();
      drawers = '<div class="drawer-cabinet">' + [1,2,3,4,5].map(box => {
        const dueInBox = state.cards.filter(c => c.type===type && c.box===box && c.nextReview<=today && matchesCategory(c, catFilter)).length;
        return `
          <div class="drawer">
            <div class="drawer-tab" style="background:${colors[box]}">${faNum(box)}</div>
            <div class="drawer-mid"><div class="drawer-title">${tf('boxLabel', {n: faNum(box)})}</div><div class="drawer-interval">${intervalLabel(box)}</div></div>
            <div class="drawer-count">${dueInBox>0 ? `<span class="drawer-due-dot" style="background:${colors[box]};box-shadow:0 0 6px ${colors[box]}"></span>` : ''}<span class="drawer-count-num">${faNum(bc[box])}</span></div>
          </div>`;
      }).join('') + '</div>';
    }
    const ctaClass = type==='sentence' ? 'btn-primary sentence-cta' : 'btn-primary';
    const levelBadge = type==='word' ? renderLevelBadge() : '';
    return `
      <div class="panel">
        <div class="deck-header"><span class="deck-title" style="color:${colors[3]}">${title}${levelBadge}</span><span class="deck-sub">${tf('deckCountLine', {total: faNum(total), type: typeLabel(type), due: faNum(dc)})}</span></div>
        ${drawers}
        <button class="${ctaClass}" ${dc===0?'disabled':''} onclick="startSession('${type}')">${dc===0 ? t('nothingToday') : tf('startStudyBtn', {n: faNum(dc)})}</button>
      </div>
    `;
  }

  function renderAdd(){
    const hasPreview = !!state.preview;
    let previewHtml = '';
    if (hasPreview){
      previewHtml = `
        <div class="preview-list">
          ${state.preview.parsed.map((p,i) => `<div class="preview-row"><button class="speak-icon-btn" onclick="speakPreview(${i})">${icon('volume',14)}</button><div class="preview-de">${esc(p.de)}</div><div class="preview-fa">${esc(p.fa)}</div></div>`).join('')}
        </div>
        ${state.preview.failed.length>0 ? `<div class="preview-warn">${tf('previewFailWarn', {n: faNum(state.preview.failed.length)})}</div>` : ''}
        <button class="btn-primary" style="margin-top:12px" ${state.preview.parsed.length===0?'disabled':''} onclick="confirmAdd()">${tf('addConfirmBtn', {n: faNum(state.preview.parsed.length), type: typeLabel(state.addType)})}</button>
        <button class="btn-secondary" onclick="cancelPreview()">${t('editTextBtn')}</button>
      `;
    }
    const catPicker = hasPreview ? '' : `
      <div style="margin-bottom:14px">
        <select class="select-input" onchange="setAddCategory(this.value)">${renderCategoryOptions(state.addCategoryId, false)}</select>
        ${state.showNewCategoryInput
          ? `<div style="display:flex;gap:8px;margin-top:8px"><input id="newCategoryInput" class="text-input" style="flex:1" placeholder="${t('addNewCategoryPlaceholder')}"><button class="btn-secondary" style="margin-top:0;width:auto;padding:10px 14px" onclick="addCategoryFromInput()">${t('addNewCategorySave')}</button></div>`
          : `<button class="link-btn" onclick="toggleNewCategoryInput()">${t('addNewCategoryBtn')}</button>`}
      </div>
    `;
    const searchBox = hasPreview ? '' : `
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <input id="addSearchInput" class="text-input" style="flex:1" placeholder="${tf('addSearchPlaceholder', {type: typeLabel(state.addType)})}" value="${esc(state.addSearchQuery)}" onkeydown="if(event.key==='Enter'){runAddSearch();}">
        <button class="btn-secondary" style="margin-top:0;width:auto;padding:10px 14px;display:flex;align-items:center;gap:6px" onclick="runAddSearch()">${icon('search',15)}${t('addSearchBtn')}</button>
      </div>
      ${renderAddSearchResults()}
    `;
    return `
      <div class="panel">
        <div class="type-toggle">
          <button class="type-btn ${state.addType==='word'?'active-word':''}" onclick="setAddType('word')">${t('wordBtn')}</button>
          <button class="type-btn ${state.addType==='sentence'?'active-sentence':''}" onclick="setAddType('sentence')">${t('sentenceBtn')}</button>
        </div>
        ${catPicker}
        ${searchBox}
        <div class="hint-text">${tf('addHint', {type: typeLabel(state.addType), lang: targetLangLabel()})}<br><code>${addExampleText()}</code></div>
        <textarea id="addTextarea" ${hasPreview?'readonly':''} placeholder="Guten Morgen - صبح بخیر
das Buch - کتاب
Ich möchte einen Kaffee, bitte - من یک قهوه می‌خواهم لطفاً">${esc(state.inputText)}</textarea>
        ${!hasPreview ? `<button class="btn-primary" style="margin-top:12px" onclick="parsePreview()">${t('addPreviewBtn')}</button>` : previewHtml}
      </div>
    `;
  }

  function renderTranslate(){
    const hasResult = !!state.translateResult;
    const TL = TRANSLATE_LANGUAGES_FN();
    const srcInfo = TL[state.translateSrcLang] || TL.fa;
    const tgtInfo = TL[state.translateTgtLang] || TL.de;
    return `
      <div class="panel">
        <div class="deck-header"><span class="deck-title" style="color:var(--violet)">${t('translateTitle')}</span><span class="deck-sub">${srcInfo.flag} ← → ${tgtInfo.flag}</span></div>
        <div class="hint-text" style="margin-bottom:10px">${t('translateHint')}</div>
        <div class="translate-lang-row">
          <div class="translate-lang-picker">
            <span class="translate-lang-picker-label">${t('translateFrom')}</span>
            <select class="select-input translate-lang-select" onchange="setTranslateSrcLang(this.value)">
              ${Object.keys(TL).map(code => `<option value="${code}" ${state.translateSrcLang===code?'selected':''}>${TL[code].flag} ${esc(TL[code].label)}</option>`).join('')}
            </select>
          </div>
          <button class="translate-swap-btn" onclick="swapTranslateLangs()" title="${t('translateSwap')}" aria-label="${t('translateSwap')}">${icon('swap',16)}</button>
          <div class="translate-lang-picker">
            <span class="translate-lang-picker-label">${t('translateTo')}</span>
            <select class="select-input translate-lang-select" onchange="setTranslateTgtLang(this.value)">
              ${Object.keys(TL).map(code => `<option value="${code}" ${state.translateTgtLang===code?'selected':''}>${TL[code].flag} ${esc(TL[code].label)}</option>`).join('')}
            </select>
          </div>
        </div>
        <textarea id="translateInput" placeholder="${esc(t('translatePlaceholder'))}" style="min-height:100px">${esc(state.translateInput)}</textarea>
        <button class="btn-primary" style="margin-top:12px;background:linear-gradient(180deg,#9B7EC4,#6f5798);color:#fff" onclick="runTranslate()" ${state.translateLoading?'disabled':''}>${state.translateLoading ? t('translateLoading') : t('translateBtn')}</button>
        ${state.translateError ? `<div class="preview-warn">${esc(state.translateError)}</div>` : ''}
        ${hasResult ? `

  function renderPronunciation(){
    if (state.sessionQueue.length === 0){
      return `<div class="panel"><div class="empty-state">${icon('archive',30)}<div>${t('pronunEmpty')}</div><button class="btn-secondary" onclick="goStudyTab()">${t('backBtn')}</button></div></div>`;
    }
    if (state.sessionIndex >= state.sessionQueue.length){
      return `
        <div class="panel">
          ${renderGoalBar('pronun')}
          <div class="empty-state">
            ${icon('book',30)}
            <div>${t('pronunDoneTitle')}</div>

            <button class="btn-primary pronun-cta" style="margin-top:16px" onclick="goHome()">${t('goHomeBtn')}</button>
          </div>
        </div>
      `;
    }
    const card = state.cards.find(c => c.id === state.sessionQueue[state.sessionIndex]);
    if (!card) { state.sessionIndex++; render(); return ''; }
    const progressPct = (state.sessionIndex / state.sessionQueue.length) * 100;
    const attemptsLeft = PRONUN_MAX_ATTEMPTS - state.pronunAttempt;
    const resolved = state.pronunFeedback === 'correct' || state.pronunFeedback === 'failed';
    let feedbackHtml = '';
    let actionHtml = '';
    if (state.pronunFeedback === 'correct'){
      feedbackHtml = `<div class="pronun-feedback correct">${t('pronunCorrect')}${state.pronunHeard ? `<div style="margin-top:4px;font-size:11.5px;opacity:0.85">${tf('pronunHeard', {text: esc(state.pronunHeard)})}</div>` : ''}</div>`;
      actionHtml = `<button class="btn-primary pronun-cta" onclick="pronunNext()">${t('pronunNextCard')}</button>`;
    } else if (state.pronunFeedback === 'failed'){
      feedbackHtml = `<div class="pronun-feedback failed">${t('pronunFailed')} <b style="direction:ltr;display:inline-block">${esc(card.de)}</b></div>`;
      actionHtml = `<button class="btn-primary pronun-cta" onclick="pronunNext()">${t('pronunNextCard')}</button>`;
    } else if (state.pronunFeedback === 'retry'){
      feedbackHtml = `<div class="pronun-feedback retry">${state.pronunHeard ? tf('pronunRetryHeard', {text: esc(state.pronunHeard)}) : t('pronunRetry')}</div>`;
      actionHtml = `<button class="mic-btn-lg ${state.pronunListening?'listening':''}" onclick="pronunListen()" ${state.pronunListening?'disabled':''}>${icon('mic',18)} ${state.pronunListening?t('pronunListening'):t('pronunReadAgain')}</button>`;
    } else if (state.pronunFeedback === 'error'){
      feedbackHtml = `<div class="pronun-feedback retry">${t('pronunNoVoice')}</div>`;
      actionHtml = `<button class="mic-btn-lg ${state.pronunListening?'listening':''}" onclick="pronunListen()" ${state.pronunListening?'disabled':''}>${icon('mic',18)} ${state.pronunListening?t('pronunListening'):t('pronunReadAgain')}</button>`;
    } else {
      actionHtml = `<button class="mic-btn-lg ${state.pronunListening?'listening':''}" onclick="pronunListen()" ${state.pronunListening?'disabled':''}>${icon('mic',18)} ${state.pronunListening?t('pronunListening'):t('pronunRead')}</button>`;
    }
    return `
      <div class="panel">
        ${renderGoalBar('pronun')}
        <div class="progress-track"><div class="progress-fill" style="width:${progressPct}%;background:var(--teal)"></div></div>
        <div class="progress-label">${tf('pronunProgress', {i: faNum(state.sessionIndex+1), n: faNum(state.sessionQueue.length)})}</div>
        <div class="pronun-card">
          <div class="pronun-de">${esc(card.de)}</div>
          <button class="speak-icon-btn centered" onclick="speakCard('${card.id}')">${icon('volume',15)} ${t('pronunHearCorrect')}</button>
        </div>
        <div class="pronun-attempts">${tf('pronunAttempts', {a: faNum(state.pronunAttempt), max: faNum(PRONUN_MAX_ATTEMPTS), left: faNum(Math.max(attemptsLeft,0))})}</div>
        ${feedbackHtml}
        ${actionHtml}
        ${!resolved ? `<button class="btn-secondary" style="margin-top:10px;color:var(--sage);border-color:var(--sage)" onclick="markPronunCorrect()">${t('pronunAnsweredCorrect')}</button>` : ''}

      </div>
    `;
  }

    const monthPrefix = `${y}-${String(m + 1).padStart(2, '0')}`;

  // لیست مدل‌های رایگان رو مستقیم از OpenRouter می‌گیره (بدون نیاز به کلید، این endpoint عمومیه)
  // و فقط اونایی که قیمت ورودی/خروجیشون صفره (یعنی واقعاً رایگانن) رو نگه می‌داره.
  async function fetchFreeOpenrouterModels(force){
    if (state.openrouterModelsStatus === 'loading') return;
    if (!force && state.openrouterFreeModels.length) return;
    state.openrouterModelsStatus = 'loading';
    state.openrouterModelsError = null;
    render();
    try {
      const res = await fetch(OPENROUTER_MODELS_ENDPOINT);
      if (!res.ok) throw new Error('bad-response');
      const data = await res.json();
      const list = (data && data.data) ? data.data : [];
      const free = list.filter(m => {
        const p = m.pricing || {};
        return parseFloat(p.prompt || '0') === 0 && parseFloat(p.completion || '0') === 0;
      }).map(m => ({ id: m.id, name: m.name || m.id })).sort((a, b) => a.name.localeCompare(b.name));
      state.openrouterFreeModels = free;
      state.openrouterModelsStatus = 'ready';
      if (free.length && !free.some(m => m.id === state.openrouterModel)){
        setOpenrouterModel(free[0].id);
      }
    } catch(e){
      state.openrouterModelsStatus = 'error';
      state.openrouterModelsError = t('orModelsLoadFailed');
    }
    render();
  }

  // --- کش پاسخ‌های هوش مصنوعی در IndexedDB ---
  // این کش باعث می‌شه سؤالی که قبلاً یک‌بار پاسخ گرفته، دفعه‌های بعد بدون نیاز به اجرای دوباره مدل در دسترس باشه.
  let offlineDbPromise = null;
  function openOfflineDb(){
    if (offlineDbPromise) return offlineDbPromise;
    offlineDbPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open('leitner_ai_cache_db', 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains('responses')) db.createObjectStore('responses', { keyPath: 'key' });
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return offlineDbPromise;
  }
  function aiCacheKey(kind, input){ return `${kind}::${input}`.slice(0, 500); }
  async function getCachedAiResponse(kind, input){
    try {
      const db = await openOfflineDb();
      return await new Promise((resolve) => {
        const tx = db.transaction('responses', 'readonly');
        const req = tx.objectStore('responses').get(aiCacheKey(kind, input));
        req.onsuccess = () => resolve(req.result ? req.result.value : null);
        req.onerror = () => resolve(null);
      });
    } catch(e){ return null; }
  }
  async function setCachedAiResponse(kind, input, value){
    try {
      const db = await openOfflineDb();
      const tx = db.transaction('responses', 'readwrite');
      tx.objectStore('responses').put({ key: aiCacheKey(kind, input), value, savedAt: Date.now() });
    } catch(e){ console.error('AI cache write failed', e); }
  }

  // مدل همیشه دقیقاً JSON خالص برنمی‌گردونه؛ این تابع تلاش می‌کنه
  // از داخل متنِ خروجی (حتی اگه قبل/بعدش توضیح اضافه باشه) یه JSON معتبر پیدا و پارس کنه.
  function extractJson(text){
    if (!text) return null;
    let raw = String(text).trim().replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/```\s*$/, '').trim();
    try { return JSON.parse(raw); } catch(e){}
    const start = raw.indexOf('{');
    const end = raw.lastIndexOf('}');
    if (start !== -1 && end !== -1 && end > start){
      try { return JSON.parse(raw.slice(start, end + 1)); } catch(e){}
    }
    return null;
  }

  // اجرای یک پرامپت روی OpenRouter (https://openrouter.ai/api/v1/chat/completions) و برگردوندن متن پاسخ
  async function runOpenrouterPrompt(systemPrompt, userPrompt, imageDataUrl){
    const key = (state.openrouterKey || '').trim();
    if (!key) throw new Error(t('aiKeyNeeded'));
    const model = state.openrouterModel || DEFAULT_OPENROUTER_MODEL;
    const userContent = imageDataUrl
      ? [ { type: 'text', text: userPrompt }, { type: 'image_url', image_url: { url: imageDataUrl } } ]
      : userPrompt;
    let res;
    try {
      res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${key}`,
          'Content-Type': 'application/json',
          'HTTP-Referer': window.location.href,
          'X-Title': 'Leitner Box',
        },
        body: JSON.stringify({
          model,
          messages: [
            { role: 'system', content: systemPrompt },
            { role: 'user', content: userContent },
          ],
          temperature: 0.6,
        }),
      });
    } catch(e){
      throw new Error(t('orConnFailed'));
    }
    if (!res.ok){
      let msg = tf('orErrorCode', {code: res.status});
      if (res.status === 401) msg = t('orInvalidKey');
      else if (res.status === 402) msg = t('orInsufficientCredit');
      else if (res.status === 429) msg = t('orTooManyRequests');
      else if (res.status === 400 && imageDataUrl) msg = t('orNoImageSupport');
      try {
        const errBody = await res.json();
        if (errBody && errBody.error && errBody.error.message) msg = errBody.error.message;
      } catch(e){}
      throw new Error(msg);
    }
    const data = await res.json();
    const content = data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
    if (!content) throw new Error(t('orNoModelReply'));
    return content;
  }

  // --- دستیار هوش مصنوعی (از طریق OpenRouter API) ---
  // --- زبان تدریس (برای ترجمه/گرامر/تمرین/پیشنهاد جمله) ---
  const LANGUAGE_CODES = ['de','en','es','it','fr'];
  const LANGUAGE_META = {
    de: { native: 'Deutsch', flag: '🇩🇪', bcp47: 'de-DE' },
    en: { native: 'English', flag: '🇬🇧', bcp47: 'en-US' },
    es: { native: 'Español', flag: '🇪🇸', bcp47: 'es-ES' },
    it: { native: 'Italiano', flag: '🇮🇹', bcp47: 'it-IT' },
    fr: { native: 'Français', flag: '🇫🇷', bcp47: 'fr-FR' },
  };
  function LANGUAGES_FN(){
    const out = {};
    LANGUAGE_CODES.forEach(code => { out[code] = { ...LANGUAGE_META[code], label: t('lang_' + code) }; });
    return out;
  }
  // شامل فارسی هم می‌شه؛ برای بخش ترجمه که کاربر باید بتونه فارسی رو هم به‌عنوان زبان مبدا/مقصد انتخاب کنه
  function TRANSLATE_LANGUAGES_FN(){
    return { fa: { label: t('lang_fa'), native: 'فارسی', flag: '🇮🇷', bcp47: 'fa-IR' }, ...LANGUAGES_FN() };
  }
  function teachLang(){ return LANGUAGE_CODES.includes(state.aiTeachLang) ? state.aiTeachLang : 'de'; }
  function teachLangLabel(){ return LANGUAGES_FN()[teachLang()].label; }
  function loadAiTeachLang(){
    try {
      const v = localStorage.getItem(AI_TEACH_LANG_KEY);
      state.aiTeachLang = (v && LANGUAGE_CODES.includes(v)) ? v : 'de';
    } catch(e){ state.aiTeachLang = 'de'; }
  }
  function setAiTeachLang(code){
    if (!LANGUAGE_CODES.includes(code)) return;
    state.aiTeachLang = code;
    try { localStorage.setItem(AI_TEACH_LANG_KEY, code); } catch(e){}
    render();
  }
  function resolveModeField(val){ return typeof val === 'function' ? val() : val; }

  // زبان پاسخ دستیار هوش مصنوعی رو بر اساس زبان فعلی برنامه مشخص می‌کنه (نه فقط فارسی)
  function uiLangNativeName(){
    const info = UI_LANGUAGE_META[state.uiLang] || UI_LANGUAGE_META.fa;
    return info.native;
  }
  function aiLangInstruction(){
    return `Always respond in ${uiLangNativeName()} (the app's current interface language) unless the user explicitly asks for a different language for the whole answer or a specific part of it.`;
  }
  function AI_MODES_FN(){ return {
    chat: {

    },
    translate: {

    },

    },
    practice: {
      label: t('aiModePractice'),

    },

- Never use markdown, headers, bullet points, numbered lists, or asterisks. Write only plain, natural spoken sentences, exactly as a person would say them out loud.
- Keep replies short and conversational (usually 1-4 sentences), like a real phone conversation, unless the user clearly asks for a longer explanation.

      }

  // سوال‌های آماده‌ی «از معلم بپرس» — دقیقاً بر اساس چیزی که کاربر می‌خواد از معلم بپرسه

  // --- AI fab drag position (mouse + touch, via Pointer Events) ---
  function loadAiFabPos(){
    try {
      const raw = localStorage.getItem(AI_FAB_POS_KEY);
      state.aiFabPos = raw ? JSON.parse(raw) : null;
    } catch(e){ state.aiFabPos = null; }
  }
  function clampFabPos(x, y){
    const size = 58, margin = 6;
    const maxX = Math.max(margin, window.innerWidth - size - margin);
    const maxY = Math.max(margin, window.innerHeight - size - margin);
    return { x: Math.min(Math.max(margin, x), maxX), y: Math.min(Math.max(margin, y), maxY) };
  }
  let aiFabDrag = null;
  let aiFabJustDragged = false;
  function aiFabPointerDown(e){
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    const btn = e.currentTarget;
    const rect = btn.getBoundingClientRect();
    aiFabDrag = { startX: e.clientX, startY: e.clientY, origLeft: rect.left, origTop: rect.top, moved: false, pointerId: e.pointerId };
    try { btn.setPointerCapture(e.pointerId); } catch(err){}
  }
  function aiFabPointerMove(e){
    if (!aiFabDrag || e.pointerId !== aiFabDrag.pointerId) return;
    const dx = e.clientX - aiFabDrag.startX;
    const dy = e.clientY - aiFabDrag.startY;
    if (!aiFabDrag.moved && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) aiFabDrag.moved = true;
    if (!aiFabDrag.moved) return;
    const btn = e.currentTarget;
    const pos = clampFabPos(aiFabDrag.origLeft + dx, aiFabDrag.origTop + dy);
    btn.style.left = pos.x + 'px';
    btn.style.top = pos.y + 'px';
    btn.style.right = 'auto';
    btn.style.bottom = 'auto';
  }
  function aiFabPointerUp(e){
    if (!aiFabDrag || e.pointerId !== aiFabDrag.pointerId) return;
    const btn = e.currentTarget;
    const moved = aiFabDrag.moved;
    try { btn.releasePointerCapture(e.pointerId); } catch(err){}
    if (moved){
      const rect = btn.getBoundingClientRect();
      state.aiFabPos = { x: rect.left, y: rect.top };
      try { localStorage.setItem(AI_FAB_POS_KEY, JSON.stringify(state.aiFabPos)); } catch(err){}
      aiFabJustDragged = true;
    }
    aiFabDrag = null;
  }
  function aiFabClick(e){
    if (aiFabJustDragged){ aiFabJustDragged = false; if (e) e.preventDefault(); return; }
    openAiPage();
  }

  async function sendAiMessage(presetText){
    syncAiInput();
    const text = (typeof presetText === 'string' ? presetText : state.aiInput).trim();
    const imageData = state.aiImageData;
    if (!text && !imageData) return;
    const modeCfg = AI_MODES_FN()[state.aiMode] || AI_MODES_FN().chat;
    const promptText = text || t('aiDescribeImage');
    state.aiMessages = [...state.aiMessages, { role: 'user', text: promptText, image: imageData || undefined }];

    state.aiLoading = true;
    state.aiError = null;

    // پاسخ قبلاً یک‌بار برای همین سوال (در همین حالت) گرفته شده؟ از کش بیار، حتی بدون اینترنت. (وقتی عکسی ضمیمه نشده)
    const cacheKind = `mode:${state.aiMode}`;
    if (!imageData){
      const cached = await getCachedAiResponse(cacheKind, promptText);

        state.aiLoading = false;
        saveCurrentAiSession();
        render();
        scrollAiToBottom();
        return;

    let replyText = null;

    if (hasOpenrouterKey()){

    } else {
      state.aiError = t('aiKeyNeededFab');
    }

    if (replyText){
      state.aiMessages = [...state.aiMessages, { role: 'model', text: replyText }];

  // --- AI chat: attach image ---
  function pickAiImage(){

  function handleAiImageFile(input){
    const file = input.files && input.files[0];
    input.value = '';
    if (!file) return;
    if (!file.type || !file.type.startsWith('image/')){ alert(t('alertImageOnly')); return; }
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 1024;
        let width = img.width, height = img.height;
        if (width > maxDim || height > maxDim){
          const scale = maxDim / Math.max(width, height);
          width = Math.round(width * scale);
          height = Math.round(height * scale);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const cctx = canvas.getContext('2d');
        cctx.drawImage(img, 0, 0, width, height);
        state.aiImageData = canvas.toDataURL('image/jpeg', 0.75);
        render();
      };
      img.onerror = () => alert(t('alertImageOpenFail'));
      img.src = reader.result;
    };
    reader.onerror = () => alert(t('alertImageReadFail'));
    reader.readAsDataURL(file);
  }

  // --- حالت مکالمه‌ی صوتی (بدون تایپ؛ فقط صحبت کن و جواب بشنو) ---
  let voiceRecognition = null;
  function voiceLangBcp47(){

  function getVoiceRecognition(){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return null;
    if (!voiceRecognition) voiceRecognition = new SR();
    voiceRecognition.lang = voiceLangBcp47();
    voiceRecognition.interimResults = true;
    voiceRecognition.maxAlternatives = 1;
    voiceRecognition.continuous = false;
    return voiceRecognition;
  }
  async function startVoiceListening(){
    if (state.aiVoiceStatus === 'listening') return;
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    const rec = getVoiceRecognition();
    if (!rec){ alert(t('alertNoSpeechRecog')); return; }
    if (state.micPermState !== 'granted'){
      await requestMicPermission();
      if (state.micPermState !== 'granted'){ alert(t('alertMicNeededVoice')); return; }
    }
    state.aiVoiceStatus = 'listening';
    state.aiVoiceLiveText = '';
    state.aiError = null;
    render();
    rec.onresult = (e) => {
      let finalText = '', interim = '';
      for (let i = 0; i < e.results.length; i++){
        const r = e.results[i];
        if (r.isFinal) finalText += r[0].transcript;
        else interim += r[0].transcript;
      }
      state.aiVoiceLiveText = (finalText + ' ' + interim).trim();
      render();
      if (finalText.trim()) { try { rec.stop(); } catch(err){} }
    };
    rec.onerror = () => { if (state.aiVoiceStatus === 'listening'){ state.aiVoiceStatus = 'idle'; render(); } };
    rec.onend = () => {
      if (state.aiVoiceStatus !== 'listening') return;
      const finalText = (state.aiVoiceLiveText || '').trim();
      state.aiVoiceStatus = 'idle';
      state.aiVoiceLiveText = '';
      if (finalText) sendVoiceMessage(finalText); else render();
    };
    try { rec.start(); } catch(e){ state.aiVoiceStatus = 'idle'; render(); }
  }
  function stopVoiceListening(){
    if (voiceRecognition){
      try { voiceRecognition.onresult = null; voiceRecognition.onerror = null; voiceRecognition.onend = null; voiceRecognition.abort(); } catch(e){}
    }
    if (state.aiVoiceStatus === 'listening'){ state.aiVoiceStatus = 'idle'; state.aiVoiceLiveText = ''; }
    render();
  }
  function toggleVoiceListening(){
    if (state.aiVoiceStatus === 'listening') stopVoiceListening();
    else if (state.aiVoiceStatus === 'idle') startVoiceListening();

      startVoiceListening();
    }
  }

  async function sendVoiceMessage(text){
    state.aiVoiceStatus = 'thinking';
    state.aiVoiceLastUser = text;
    state.aiVoiceLastModel = '';
    state.aiMessages = [...state.aiMessages, { role: 'user', text }];

    const modeCfg = AI_MODES_FN().voice;

      state.aiVoiceLastModel = replyText;
      saveCurrentAiSession();

    }
  }
  function speakVoiceReply(text){
    if (!('speechSynthesis' in window)){ state.aiVoiceStatus = 'idle'; render(); return; }
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      const bcp = voiceLangBcp47();
      u.lang = bcp;
      const v = getVoiceForLang(bcp);
      if (v) u.voice = v;
      u.rate = 1;
      u.onend = () => {
        if (state.aiVoiceStatus !== 'speaking') return;
        state.aiVoiceStatus = 'idle';
        render();
        if (state.aiVoiceAutoContinue) startVoiceListening();

      u.onerror = () => { state.aiVoiceStatus = 'idle'; render(); };
      window.speechSynthesis.speak(u);
    } catch(e){ state.aiVoiceStatus = 'idle'; render(); }
  }

      if (!hasOpenrouterKey()) throw new Error(t('aiKeyNeeded'));
      const system = 'You must respond with ONLY a single pure JSON object, no explanation or Markdown, exactly in this shape: {"meaning": "...", "grammar": "...", "vocab": [{"word": "...", "meaning": "..."}], "similar": {"sentence": "...", "meaning": "..."} or null}';
      const prompt = `Sentence: "${card.de}"\nMeaning (in ${uiLangNativeName()}): "${card.fa}"\nExplain this sentence, in ${uiLangNativeName()}, for someone learning the language this sentence is written in:\n1) Explain the full meaning and sense of the sentence fluently in ${uiLangNativeName()} (not just a word-for-word translation — unpack the meaning too).\n2) Write the sentence's key grammar points (structure, verb tense, mood, and anything the learner should know) briefly and practically, in ${uiLangNativeName()}.\n3) List the sentence's most important words or phrases (max 5) with their meaning in ${uiLangNativeName()}.\n4) Only if it would genuinely help, create one more similar sentence (with close structure or vocabulary) in the same language as the original sentence, and give its meaning in ${uiLangNativeName()} too; if this isn't needed, set it to null.`;
      const replyText = await runOpenrouterPrompt(system, prompt);
      if (!replyText) throw new Error(t('aiNoReply'));
      const parsed = extractJson(replyText);
      if (!parsed || !parsed.meaning) throw new Error(t('aiUnreadableReply'));
      if (state.aiExplainCardId === card.id){
        const vocab = Array.isArray(parsed.vocab)
          ? parsed.vocab.filter(v => v && v.word).slice(0, 6).map(v => ({ word: String(v.word).trim(), meaning: String(v.meaning || '').trim() }))
          : [];
        const similar = (parsed.similar && parsed.similar.sentence)
          ? { sentence: String(parsed.similar.sentence).trim(), meaning: String(parsed.similar.meaning || '').trim() }
          : null;
        state.aiExplainResult = { meaning: String(parsed.meaning).trim(), grammar: String(parsed.grammar || '').trim(), vocab, similar };
      }
    } catch(e){
      if (state.aiExplainCardId === card.id){
        state.aiExplainError = (e && e.message) || t('aiConnectionFailed');
      }
    }
    if (state.aiExplainCardId === card.id) state.aiExplainLoading = false;
    render();
  }

  function isStandalone(){ return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true; }

  async function toggleReminders(){
    if (state.remindersEnabled) {
      state.remindersEnabled = false;
      localStorage.setItem(REMIND_KEY, '0');
      stopReminderWatcher();
      render();
      return;
    }
    if (isIos() && !isStandalone()){
      alert(t('alertIosNotifSetup'));
      return;
    }
    if (!('Notification' in window)) { alert(t('alertNoNotifSupport')); return; }
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') { alert(t('alertNotifDenied')); return; }
    state.remindersEnabled = true;
    localStorage.setItem(REMIND_KEY, '1');
    if (!state.reminderTime) state.reminderTime = '09:00';
    try { localStorage.setItem(REMINDER_TIME_KEY, state.reminderTime); } catch(e){}
    try {
      if ('serviceWorker' in navigator) {
        const reg = await navigator.serviceWorker.ready;
        if ('periodicSync' in reg) {
          try {
            const status = await navigator.permissions.query({ name: 'periodic-background-sync' });
            if (status.state === 'granted') {
              await reg.periodicSync.register('leitner-daily-reminder', { minInterval: 24*60*60*1000 });
            }
          } catch(e) { /* not supported on this browser, that's fine */ }
        }
      }
    } catch(e){ console.error(e); }
    startReminderWatcher();
    render();
  }

  // --- foreground alarm watcher: checks every 20s while the app is open/in background tab ---
  let reminderIntervalHandle = null;
  function startReminderWatcher(){
    stopReminderWatcher();
    checkReminderTime();
    reminderIntervalHandle = setInterval(checkReminderTime, 20000);
  }
  function stopReminderWatcher(){
    if (reminderIntervalHandle){ clearInterval(reminderIntervalHandle); reminderIntervalHandle = null; }
  }
  function checkReminderTime(){
    if (!state.remindersEnabled || !state.reminderTime) return;
    const now = new Date();
    const cur = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    if (cur !== state.reminderTime) return;
    const today = todayStr();
    let lastFired = null;
    try { lastFired = localStorage.getItem(REMINDER_LAST_FIRED_KEY); } catch(e){}
    if (lastFired === today) return;
    try { localStorage.setItem(REMINDER_LAST_FIRED_KEY, today); } catch(e){}
    fireReminderAlarm();
  }
  async function fireReminderAlarm(){
    playAlarmSound();
    if (navigator.vibrate) { try { navigator.vibrate([300,150,300,150,300]); } catch(e){} }
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    try {
      if ('serviceWorker' in navigator) {
        const reg = await navigator.serviceWorker.ready;
        reg.showNotification(t('appTitle'), { body: pickReminderMessage(), icon: 'icon-192.png', badge: 'icon-badge.png', vibrate: [300,150,300] });
      } else {
        new Notification(t('appTitle'), { body: pickReminderMessage(), icon: 'icon-192.png' });
      }
    } catch(e){}
  }
  function playAlarmSound(){
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      const ctx = new Ctx();
      const now = ctx.currentTime;
      [0, 0.35, 0.7].forEach((t, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = i % 2 === 0 ? 880 : 660;
        gain.gain.setValueAtTime(0.0001, now + t);
        gain.gain.exponentialRampToValueAtTime(0.3, now + t + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + t + 0.3);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(now + t); osc.stop(now + t + 0.32);
      });
    } catch(e){}
  }

  function startSession(type){
    state.studyType = type;

    state.pronunListening = false;

      const pool = state.cards.filter(c => matchesCategory(c, state.studyCategoryFilter));
      state.sessionQueue = shuffle(pool).map(c=>c.id);
    } else {
      const today = todayStr();
      const due = state.cards.filter(c => c.type===type && c.nextReview <= today && matchesCategory(c, state.studyCategoryFilter));
      const sorted = shuffle(due).sort((a,b) => a.box - b.box);
      state.sessionQueue = sorted.map(c=>c.id);
    }
    state.sessionIndex = 0;
    state.sessionStats = { correct:0, wrong:0 };
    state.revealed = false;
    state.aiSentenceCardId = null;

  function reveal(){
    const cardId = state.sessionQueue[state.sessionIndex];

  function answer(correct){
    const today = todayStr();
    const cardId = state.sessionQueue[state.sessionIndex];
    const card = state.cards.find(c => c.id === cardId);
    if (!card) return;
    const prevBox = card.box;
    const prevNextReview = card.nextReview;
    const newBox = correct ? Math.min(card.box+1, 5) : 1;
    const newNextReview = addDays(today, BOX_INTERVALS[newBox]);
    state.cards = state.cards.map(c => c.id===card.id ? {...c, box:newBox, nextReview:newNextReview} : c);
    persistCards();
    const t = card.type;
    state.stats[t].correct += correct ? 1 : 0;
    state.stats[t].wrong += correct ? 0 : 1;
    persistStats();
    if (card.curriculumLevel && correct) {
      const prog = curriculumProgressForLang();
      if (card.curriculumLevel === 'A1') prog.correctA1 += 1;
      else if (card.curriculumLevel === 'A2') prog.correctA2 += 1;
      else if (card.curriculumLevel === 'B1') prog.correctB1 += 1;
      persistCurriculumProgressState();
      recomputeCurriculumStage();
    }
    if (correct) incrementDailyProgress(t);
    state.sessionStats = { correct: state.sessionStats.correct+(correct?1:0), wrong: state.sessionStats.wrong+(correct?0:1) };
    state.lastAction = { cardId: card.id, prevBox, prevNextReview, correct, type: t, sessionIndex: state.sessionIndex, curriculumLevel: card.curriculumLevel || null };
    state.revealed = false;
    state.sessionIndex += 1;
    render();
  }
  function undoLastAnswer(){
    const a = state.lastAction;
    if (!a) return;
    state.cards = state.cards.map(c => c.id===a.cardId ? {...c, box:a.prevBox, nextReview:a.prevNextReview} : c);
    persistCards();
    state.stats[a.type].correct -= a.correct ? 1 : 0;
    state.stats[a.type].wrong -= a.correct ? 0 : 1;
    persistStats();
    if (a.curriculumLevel && a.correct) {
      const prog = curriculumProgressForLang();
      if (a.curriculumLevel === 'A1') prog.correctA1 = Math.max(0, prog.correctA1 - 1);
      else if (a.curriculumLevel === 'A2') prog.correctA2 = Math.max(0, prog.correctA2 - 1);
      else if (a.curriculumLevel === 'B1') prog.correctB1 = Math.max(0, prog.correctB1 - 1);
      persistCurriculumProgressState();
    }
    if (a.correct) decrementDailyProgress(a.type);
    state.sessionStats = { correct: state.sessionStats.correct-(a.correct?1:0), wrong: state.sessionStats.wrong-(a.correct?0:1) };
    state.sessionIndex = a.sessionIndex;
    state.revealed = true;
    state.lastAction = null;
    render();
  }

  function resetAllData(){
    if (!confirm(t('confirmWipeAll'))) return;
    exportBackup();
    if (!confirm(t('confirmWipeAllStep2'))) return;
    state.cards = [];
    state.categories = [];
    state.stats = { word:{correct:0,wrong:0}, sentence:{correct:0,wrong:0}, pronun:{correct:0,wrong:0} };
    state.activityDays = {};
    try {
      localStorage.setItem(cardsKeyFor(currentTargetLangCode()), JSON.stringify(state.cards));
      localStorage.setItem(categoriesKeyFor(currentTargetLangCode()), JSON.stringify(state.categories));
      localStorage.setItem(statsKeyFor(currentTargetLangCode()), JSON.stringify(state.stats));
      localStorage.setItem(ACTIVITY_KEY, JSON.stringify(state.activityDays));
    } catch(e){ console.error(e); }
    queueCloudSync();
    state.view = 'home';
    state.activeCategoryId = null;
    alert(t('alertWipeDone'));
    render();
  }
  function exportBackup(){
    const json = JSON.stringify({ cards: state.cards, stats: state.stats, categories: state.categories, activityDays: state.activityDays });
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(json).then(() => alert(t('alertBackupCopied'))).catch(() => prompt(t('promptBackupFallback'), json));
    } else {
      prompt(t('promptBackupFallback'), json);
    }
  }
  function toggleImport(){ state.showImport = !state.showImport; render(); }
  function doImport(){
    const ta = document.getElementById('importTextarea');
    if (!ta) return;
    try {
      const parsed = JSON.parse(ta.value);
      let cards, stats, categories;
      if (Array.isArray(parsed)) { cards = parsed; stats = state.stats; categories = state.categories; }
      else { cards = parsed.cards || []; stats = parsed.stats || state.stats; categories = parsed.categories || state.categories; }
      state.cards = cards.map(c => ({ ...c, type: c.type==='sentence' ? 'sentence' : 'word', categoryId: c.categoryId || null }));
      state.stats = {
        word: {correct:(stats.word&&stats.word.correct)||0, wrong:(stats.word&&stats.word.wrong)||0},
        sentence: {correct:(stats.sentence&&stats.sentence.correct)||0, wrong:(stats.sentence&&stats.sentence.wrong)||0},
        pronun: {correct:(stats.pronun&&stats.pronun.correct)||0, wrong:(stats.pronun&&stats.pronun.wrong)||0}
      };
      state.categories = Array.isArray(categories) ? categories : [];
      if (!Array.isArray(parsed) && parsed.activityDays) state.activityDays = normalizeActivityDays(parsed.activityDays);
      persistCards(); persistStats(); persistCategories(); persistActivityDays();
      state.showImport = false;
      render();
      alert(t('alertRestoreDone'));
    } catch(e){ alert(t('alertRestoreInvalid')); }
  }

  // --- translate (manual source/target language) ---
  const TRANSLATE_LANGUAGE_CODES = ['fa', ...LANGUAGE_CODES];
  function loadTranslateLang(){
    try {
      const raw = localStorage.getItem(TRANSLATE_LANG_KEY);
      const v = raw ? JSON.parse(raw) : null;
      state.translateSrcLang = (v && TRANSLATE_LANGUAGE_CODES.includes(v.src)) ? v.src : 'fa';
      state.translateTgtLang = (v && TRANSLATE_LANGUAGE_CODES.includes(v.tgt)) ? v.tgt : 'de';
    } catch(e){ state.translateSrcLang = 'fa'; state.translateTgtLang = 'de'; }
  }
  function persistTranslateLang(){
    try { localStorage.setItem(TRANSLATE_LANG_KEY, JSON.stringify({ src: state.translateSrcLang, tgt: state.translateTgtLang })); } catch(e){}
  }
  function setTranslateSrcLang(code){
    if (!TRANSLATE_LANGUAGE_CODES.includes(code)) return;
    state.translateSrcLang = code;
    if (state.translateSrcLang === state.translateTgtLang){
      state.translateTgtLang = TRANSLATE_LANGUAGE_CODES.find(c => c !== code) || state.translateTgtLang;
    }
    persistTranslateLang();
    render();
  }
  function setTranslateTgtLang(code){
    if (!TRANSLATE_LANGUAGE_CODES.includes(code)) return;
    state.translateTgtLang = code;
    if (state.translateSrcLang === state.translateTgtLang){
      state.translateSrcLang = TRANSLATE_LANGUAGE_CODES.find(c => c !== code) || state.translateSrcLang;
    }
    persistTranslateLang();
    render();
  }
  function swapTranslateLangs(){
    const s = state.translateSrcLang, t = state.translateTgtLang;
    state.translateSrcLang = t;
    state.translateTgtLang = s;
    if (state.translateResult){
      const oldInput = state.translateInput;
      state.translateInput = state.translateResult;
      state.translateResult = oldInput;
    }
    persistTranslateLang();
    render();
  }
  function syncTranslateInput(){ const ta = document.getElementById('translateInput'); if (ta) state.translateInput = ta.value; }
  async function fetchGoogleTranslate(text, srcCode, tgtCode){
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${srcCode}&tl=${tgtCode}&dt=t&q=${encodeURIComponent(text)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('bad-response');
    const data = await res.json();
    const translated = (data && data[0]) ? data[0].map(seg => seg[0]).join('') : '';
    if (!translated) throw new Error('empty');
    return translated;
  }
  // برای اسم‌های آلمانی تک‌کلمه‌ای، به‌جای ترجمه خام کلمه (که آرتیکل نداره)، کلمه رو داخل
  // یه جمله کوتاه حامل («X ist da») می‌ذاریم تا گوگل مجبور بشه اسم رو با جنسیت درستش
  // (der/die/das) برگردونه، بعد اون بخش اضافه رو از جواب جدا می‌کنیم.
  const DE_ARTICLE_CARRIER_SUFFIX_BY_SRC = {
    fa: ' هست', en: ' is here', es: ' está aquí', it: ' è qui', fr: ' est là', de: ' ist da'
  };
  const DE_ARTICLE_TAIL_PATTERNS = [/\s+ist\s+da[.!?]*$/i, /\s+ist[.!?]*$/i, /\s+da[.!?]*$/i];
  function stripDeArticleCarrierTail(result){
    for (const re of DE_ARTICLE_TAIL_PATTERNS) {
      if (re.test(result)) return result.replace(re, '').trim();
    }
    return null;
  }
  async function translateSingleGermanWordWithArticle(text, srcCode){
    const carrierSuffix = DE_ARTICLE_CARRIER_SUFFIX_BY_SRC[srcCode] || DE_ARTICLE_CARRIER_SUFFIX_BY_SRC.fa;
    const wrapped = text + carrierSuffix;
    const rawResult = await fetchGoogleTranslate(wrapped, srcCode, 'de');
    const stripped = stripDeArticleCarrierTail(rawResult);
    // نتیجه معتبره فقط اگه بعد از حذف دنباله، یه عبارت کوتاه (آرتیکل+اسم) باقی مونده باشه
    if (stripped && stripped.split(/\s+/).length <= 4 && /^(der|die|das)\s+/i.test(stripped)) {
      return stripped;
    }
    return null; // نتونستیم آرتیکل رو استخراج کنیم؛ باید به ترجمه ساده برگردیم
  }
  async function runTranslate(){
    syncTranslateInput();
    const text = state.translateInput.trim();
    if (!text) return;
    const srcCode = state.translateSrcLang;
    const tgtCode = state.translateTgtLang;
    state.translateLoading = true;
    state.translateError = null;
    state.translateResult = null;
    render();
    try {
      const isSingleWord = !/\s/.test(text);
      let translated = null;
      if (tgtCode === 'de' && state.translateTypeChoice === 'word' && isSingleWord) {
        translated = await translateSingleGermanWordWithArticle(text, srcCode);
      }
      if (!translated) {
        translated = await fetchGoogleTranslate(text, srcCode, tgtCode);
      }
      state.translateResult = translated;
    } catch(e){
      state.translateError = t('translateErr');
    }
    state.translateLoading = false;
    render();
  }
  function speakTranslateResult(){
    if (!state.translateResult) return;
    const bcp47 = state.translateTgtLang === 'fa' ? 'fa-IR' : ((LANGUAGE_META[state.translateTgtLang] || LANGUAGE_META.de).bcp47);
    speak(state.translateResult, bcp47);
  }
  function addTranslationAsCard(){
    if (!state.translateResult) return;
    if (state.translateSrcLang !== 'fa' && state.translateTgtLang !== 'fa'){
      alert(t('translateNeedFa'));
      return;
    }
    const nonFaText = (state.translateTgtLang === 'fa' ? state.translateInput : state.translateResult).trim();
    state.translateTypeChoice = nonFaText.split(/\s+/).length > 2 ? 'sentence' : 'word';
    state.showTranslateTypeModal = true;
    render();
  }
  function closeTranslateTypeModal(){ state.showTranslateTypeModal = false; render(); }
  function setTranslateType(v){ state.translateTypeChoice = v; render(); }
  function confirmAddTranslationAsCard(){
    if (!state.translateResult) return;
    const de = (state.translateTgtLang === 'fa' ? state.translateInput : state.translateResult).trim();
    const fa = (state.translateTgtLang === 'fa' ? state.translateResult : state.translateInput).trim();
    if (!de || !fa) return;
    const now = new Date().toISOString();
    const today = todayStr();
    const type = state.translateTypeChoice === 'sentence' ? 'sentence' : 'word';
    const card = { id: `${Date.now()}-${Math.random().toString(36).slice(2,7)}`, de, fa, box: 1, nextReview: today, createdAt: now, type, categoryId: null };
    state.cards = [...state.cards, card];
    persistCards();
    state.showTranslateTypeModal = false;
    alert(t('translateAddedToast'));
    render();
  }

  loadTranslateLang();
  loadUiLang();
  loadProfile();
  migrateLegacyLanguageDataIfNeeded();
  loadTargetLang();
  loadCards();
  loadStats();
  loadCategories();
  loadCurriculumProgressState();
  loadThemeColor();
  loadThemeMode();
  loadReminderState();
  loadActivityDays();
  markActivityToday();
  loadAiFabPos();
  loadAiHistory();
  loadAiTeachLang();
  loadDailyGoals();
  loadDailyProgress();
  loadOpenrouterConfig();
  loadFriendData();
  render();
  ensureCurriculumBootstrapped();

  window.addEventListener('resize', () => {
    if (!state.aiFabPos) return;
    const pos = clampFabPos(state.aiFabPos.x, state.aiFabPos.y);
    state.aiFabPos = pos;
    try { localStorage.setItem(AI_FAB_POS_KEY, JSON.stringify(pos)); } catch(e){}
    const btn = document.getElementById('aiFabBtn');
    if (btn){ btn.style.left = pos.x + 'px'; btn.style.top = pos.y + 'px'; btn.style.right = 'auto'; btn.style.bottom = 'auto'; }
  });
  checkMicPermission().then(() => render());
  initAuthListener();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((e) => console.error('SW registration failed', e));
    });
  }

  window.addEventListener('load', () => {
    setTimeout(() => {
      const el = document.getElementById('splash');
      if (el) { el.classList.add('hide'); setTimeout(() => el.remove(), 500); }
    }, 6200);
  });
</script>
