<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Leitner Box">
<meta name="mobile-web-app-capable" content="yes">

<title>Leitner Box</title>
<script>
  // Apply saved theme mode immediately (before CSS paints) to avoid a flash of the wrong theme.
  (function () {
    try {
      var m = localStorage.getItem('leitner_theme_mode_v1') || 'dark';
      var resolved = m === 'light' ? 'light' : m === 'dark' ? 'dark' :
        ((window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', resolved);
    } catch (e) {}
  })();
</script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --bg: #14161f; --bg-radial: #232841; --panel: #1e2230; --panel2: #262b3d;
    --ivory: #ede6d6; --text: #ede6d6;
    --ink: #2b2a28; --muted: #9aa0b4; --brass: #c9a66b; --brass-dark: #a9824f;
    --wine: #b65c5c; --sage: #8fa37a; --sage-strong: #3fa15a; --violet: #8B6FC9;
    --teal: #3fc1c9; --teal-dark: #2b969d;
    --border: #333854; --border2: #3c4260; --divider: #292d40; --placeholder: #6b7189;
  }
  [data-theme="light"] {
    --bg: #f2ede0; --bg-radial: #ffffff; --panel: #ffffff; --panel2: #f5f1e6;
    --text: #2c2a24;
    --muted: #756f60;
    --border: #e3dcc8; --border2: #d9d0b6; --divider: #ece5d3; --placeholder: #9a9280;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; touch-action: pan-y; overflow-x: hidden; max-width: 100%; }
  body {
    font-family: 'Vazirmatn', Tahoma, sans-serif;
    background: radial-gradient(ellipse at 50% -10%, var(--bg-radial) 0%, var(--bg) 55%);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.25s ease, color 0.25s ease;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 20px 16px 40px; }

  #splash { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
  #splash.hide { opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
  .splash-stage { position: relative; width: 220px; height: 220px; }

  /* stage 5: a subtle but visible burst of light escapes from around the icon at the very end */
  .splash-glow { position: absolute; top: 50%; left: 50%; width: 270px; height: 270px; margin: -135px 0 0 -135px; border-radius: 50%; opacity: 0; transform: scale(0.75); pointer-events: none;
    background: radial-gradient(circle, rgba(201,166,107,0.5) 0%, rgba(201,166,107,0.22) 42%, rgba(201,166,107,0) 72%);
    animation: splashGlow 6.2s ease forwards; }
  @keyframes splashGlow {
    0%, 81% { opacity: 0; transform: scale(0.75); }
    90% { opacity: 1; transform: scale(1.08); }
    100% { opacity: 0; transform: scale(1.4); }
  }

  /* stages 1-2: the whole icon starts tiny/hidden, then pops in slowly enough to actually see it, with a gentle breathe as the pages begin to move */
  .splash-icon-wrap { position: absolute; top: 30px; left: 30px; width: 160px; height: 160px; opacity: 0; transform: scale(0.30); animation: splashPop 6.2s cubic-bezier(.22,.75,.25,1) forwards; }
  @keyframes splashPop {
    0%, 8% { opacity: 0; transform: scale(0.30); }
    20% { opacity: 1; transform: scale(1.15); }
    32% { opacity: 1; transform: scale(1); }
    44% { transform: scale(1.025); }
    56%, 100% { opacity: 1; transform: scale(1); }
  }

  /* stage 3: the icon's OWN pages (two extra copies of the real artwork, invisible while aligned) slide out from behind and back - the real pages fanning, not a shape we drew */
  .splash-icon-layer { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 10px 26px rgba(0,0,0,0.4)); }
  .splash-icon-layer.layer-back-a { opacity: 0; animation: splashLayerA 6.2s ease-in-out forwards; }
  .splash-icon-layer.layer-back-b { opacity: 0; animation: splashLayerB 6.2s ease-in-out forwards; }
  @keyframes splashLayerA {
    0%, 32% { opacity: 0; transform: translate(0,0) rotate(0deg); }
    46% { opacity: 0.85; transform: translate(-12px, 9px) rotate(-9deg); }
    61%, 100% { opacity: 0; transform: translate(0,0) rotate(0deg); }
  }
  @keyframes splashLayerB {
    0%, 32% { opacity: 0; transform: translate(0,0) rotate(0deg); }
    50% { opacity: 0.8; transform: translate(11px, -10px) rotate(8deg); }
    61%, 100% { opacity: 0; transform: translate(0,0) rotate(0deg); }
  }

  /* stage 4: only the bookmark ribbon glows - a warm yellow shine blooms right on it, nothing sweeps across the whole icon */
  .splash-ribbon-glow { position: absolute; left: 4%; top: -2%; width: 54%; height: 46%; border-radius: 50%; opacity: 0; transform: scale(0.8); pointer-events: none; mix-blend-mode: screen;
    background: radial-gradient(circle, rgba(255,221,120,0.95) 0%, rgba(255,197,60,0.55) 45%, rgba(255,197,60,0) 75%);
    animation: splashRibbonGlow 6.2s ease forwards; }
  @keyframes splashRibbonGlow {
    0%, 61% { opacity: 0; transform: scale(0.8); }
    71% { opacity: 1; transform: scale(1.22); }
    81%, 100% { opacity: 0; transform: scale(0.8); }
  }

  /* a real star-shaped sparkle riding on top of the glow - rays rotate and pulse so it reads as a living twinkle, not a flat fade */
  .splash-ribbon-star { position: absolute; left: 30%; top: 21.5%; width: 52px; height: 52px; margin: -26px 0 0 -26px; opacity: 0; pointer-events: none;
    background: radial-gradient(circle, #ffffff 0%, #fff6d8 28%, #ffd76a 58%, transparent 74%);
    clip-path: polygon(50% 0%, 61% 37%, 100% 50%, 61% 63%, 50% 100%, 39% 63%, 0% 50%, 39% 37%);
    filter: drop-shadow(0 0 10px rgba(255,225,140,0.9)) drop-shadow(0 0 22px rgba(255,195,70,0.55));
    animation: splashRibbonStar 6.2s ease forwards; }
  .splash-ribbon-star.small { width: 24px; height: 24px; margin: -12px 0 0 -12px; left: 40%; top: 12%; animation-delay: .15s; }
  @keyframes splashRibbonStar {
    0%, 60%   { opacity: 0; transform: scale(0.4) rotate(0deg); }
    66%       { opacity: 1; transform: scale(1.05) rotate(10deg); }
    71%       { opacity: .7; transform: scale(0.85) rotate(-6deg); }
    76%       { opacity: 1; transform: scale(1.18) rotate(14deg); }
    81%, 100% { opacity: 0; transform: scale(0.4) rotate(0deg); }
  }

  .app-header-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding-top: 0; margin-bottom: 14px; }
  .app-header-titles { flex: 1; min-width: 0; display: flex; align-items: center; justify-content: center; }
  .app-title-glass { position: relative; display: inline-flex; align-items: center; justify-content: center; max-width: 100%; padding: 9px 22px; border-radius: 18px; overflow: hidden; background: linear-gradient(160deg, rgba(255,255,255,0.16), rgba(201,166,107,0.12) 55%, rgba(255,255,255,0.04)); border: 1px solid rgba(201,166,107,0.42); box-shadow: inset 0 1px 1px rgba(255,255,255,0.22), inset 0 -8px 16px rgba(0,0,0,0.18), 0 8px 20px rgba(0,0,0,0.25); backdrop-filter: blur(8px) saturate(150%); -webkit-backdrop-filter: blur(8px) saturate(150%); }
  [data-theme="light"] .app-title-glass { background: linear-gradient(160deg, rgba(255,255,255,0.6), rgba(201,166,107,0.16) 55%, rgba(255,255,255,0.35)); border-color: rgba(169,130,79,0.45); box-shadow: inset 0 1px 1px rgba(255,255,255,0.7), inset 0 -8px 16px rgba(0,0,0,0.05), 0 8px 18px rgba(0,0,0,0.08); }
  .app-title { position: relative; z-index: 2; pointer-events: none; font-family: 'Fraunces', Georgia, serif; font-size: 27px; font-weight: 600; margin: 0; letter-spacing: 0.5px; color: var(--brass); transition: color 0.2s ease; text-shadow: 0 3px 5px rgba(0,0,0,0.35); white-space: nowrap; }
  .app-header-icon { width: 75px; height: 75px; border-radius: 16px; flex-shrink: 0; margin-top: 0; object-fit: contain; display: block; position: relative; z-index: 1; }
  .app-header-icon-wrap { position: relative; width: 75px; height: 75px; border-radius: 16px; overflow: visible; flex-shrink: 0; margin-top: 0; }
  .app-header-icon-wrap .app-header-icon { margin-top: 0; }
  .app-header-icon-wrap::before {
    content: ''; position: absolute; inset: -16px; border-radius: 50%; pointer-events: none;
    background: radial-gradient(circle, rgba(201,166,107,0.55) 0%, rgba(201,166,107,0.22) 45%, rgba(201,166,107,0) 72%);
    animation: headerIconHalo 4.5s ease-in-out infinite;
  }
  @keyframes headerIconHalo {
    0%, 100% { opacity: 0.35; transform: scale(0.92); }
    50% { opacity: 0.8; transform: scale(1.1); }
  }

  .nav-row { display: flex; gap: 4px; background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 6px; margin-bottom: 20px; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; background: transparent; border: none; color: var(--muted); padding: 7px 1px; border-radius: 10px; font-family: 'Vazirmatn', Tahoma, sans-serif; font-size: 9.5px; cursor: pointer; }
  .nav-btn.active { background: var(--panel2); color: var(--brass); }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 16px; }

  .action-row { display: flex; gap: 10px; margin-bottom: 18px; }
  .action-chip { flex: 1; display: flex; align-items: center; gap: 8px; background: var(--panel2); border: 1px solid var(--border2); border-radius: 12px; padding: 10px 12px; cursor: pointer; text-align: start; }
  .action-chip svg { color: var(--brass); flex-shrink: 0; }
  .action-chip b { display: block; font-size: 12px; font-weight: 700; }
  .action-chip span { font-size: 10px; color: var(--muted); }

  .deck-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .deck-title { font-family: 'Fraunces', Georgia, serif; font-size: 17px; font-weight: 600; }
  .deck-sub { font-size: 11px; color: var(--muted); }

  .stat-row { display: flex; gap: 12px; margin-bottom: 18px; }
  .stat-box { flex: 1; background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 14px; text-align: center; }
  .stat-num { font-family: 'JetBrains Mono', Consolas, monospace; font-size: 26px; color: var(--brass); font-weight: 600; }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .drawer-cabinet { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .drawer { display: flex; align-items: center; background: linear-gradient(90deg, var(--panel2), var(--panel)); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); height: 54px; }
  .drawer-tab { width: 46px; height: 100%; display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', Consolas, monospace; font-weight: 600; font-size: 17px; color: #1a1712; flex-shrink: 0; }
  .drawer-mid { flex: 1; padding: 0 12px; overflow: hidden; }
  .drawer-title { font-size: 13.5px; color: var(--text); }
  .drawer-interval { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .drawer-count { padding: 0 14px; text-align: center; flex-shrink: 0; }
  .drawer-count-num { font-family: 'JetBrains Mono', Consolas, monospace; font-size: 16px; color: var(--text); }
  .drawer-due-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-inline-end: 5px; }

  .btn-primary { width: 100%; background: linear-gradient(180deg, var(--brass), var(--brass-dark)); color: #201a10; border: none; border-radius: 12px; padding: 15px; font-family: 'Vazirmatn', Tahoma, sans-serif; font-weight: 700; font-size: 15.5px; cursor: pointer; }
  .btn-primary:disabled { opacity: 0.35; cursor: default; }
  .btn-primary.sentence-cta { background: linear-gradient(180deg, #9B7EC4, #6f5798); color: #fff; }
  .btn-primary.pronun-cta { background: linear-gradient(180deg, var(--teal), var(--teal-dark)); color: #07282a; }
  .btn-secondary { width: 100%; background: var(--panel2); color: var(--text); border: 1px solid var(--border2); border-radius: 12px; padding: 13px; font-family: 'Vazirmatn', Tahoma, sans-serif; font-weight: 600; font-size: 14.5px; cursor: pointer; margin-top: 10px; }

  .empty-state { text-align: center; padding: 24px 10px; color: var(--muted); }
  .empty-state svg { color: var(--brass); margin-bottom: 10px; }

  .type-toggle { display: flex; gap: 8px; margin-bottom: 14px; }
  .type-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border2); background: var(--panel2); color: var(--muted); font-family: 'Vazirmatn', Tahoma, sans-serif; font-weight: 600; font-size: 13.5px; cursor: pointer; }
  .type-btn.active-word { background: var(--brass); color: #201a10; border-color: var(--brass); }
  .type-btn.active-sentence { background: var(--violet); color: #fff; border-color: var(--violet); }

  textarea { width: 100%; background: var(--panel2); border: 1px solid var(--border2); border-radius: 12px; color: var(--text); padding: 12px; font-family: 'Vazirmatn', Tahoma, sans-serif; font-size: 16px; resize: vertical; min-height: 130px; direction: rtl; }
  textarea::placeholder { color: var(--placeholder); }
  textarea[readonly] { opacity: 0.6; }
  .guess-box { min-height: 70px; margin-bottom: 12px; direction: ltr; text-align: left; font-family: 'Fraunces', Georgia, serif; }
  .hint-text { font-size: 12.5px; color: var(--muted); line-height: 1.9; margin-bottom: 10px; }
  .hint-text code { font-family: 'JetBrains Mono', Consolas, monospace; background: var(--panel2); padding: 1px 5px; border-radius: 4px; direction: ltr; display: inline-block; }

  .preview-list { max-height: 220px; overflow-y: auto; margin: 12px 0; border: 1px solid var(--border); border-radius: 10px; }
  .preview-row { display: flex; justify-content: space-between; gap: 10px; padding: 9px 12px; border-bottom: 1px solid var(--divider); font-size: 13.5px; }
  .preview-row:last-child { border-bottom: none; }
  .preview-de { font-family: 'Fraunces', Georgia, serif; direction: ltr; text-align: left; flex: 1; }
  .preview-fa { color: var(--brass); flex: 1; text-align: right; }
  .preview-warn { color: var(--wine); font-size: 12.5px; margin-top: 8px; }

  .progress-track { height: 5px; background: var(--panel2); border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
  .progress-fill { height: 100%; background: var(--brass); }
  .progress-label { text-align: center; font-size: 12.5px; color: var(--muted); margin-bottom: 18px; font-family: 'JetBrains Mono', Consolas, monospace; }

  .flip-scene { perspective: 1600px; height: 230px; margin-bottom: 18px; }
  .flip-card { position: relative; width: 100%; height: 100%; transition: transform 0.55s cubic-bezier(.4,.2,.2,1); transform-style: preserve-3d; }
  .flip-card.is-flipped { transform: rotateY(180deg); }
  .flip-face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
  .flip-front { background: var(--ivory); color: var(--ink); box-shadow: 0 10px 30px rgba(0,0,0,0.35); }
  .flip-back { background: var(--ivory); color: var(--ink); transform: rotateY(180deg); box-shadow: 0 10px 30px rgba(0,0,0,0.35); }
  .card-box-tag { position: absolute; top: 12px; right: 14px; font-family: 'JetBrains Mono', Consolas, monospace; font-size: 11px; color: #201a10; padding: 3px 9px; border-radius: 20px; font-weight: 600; }
  .card-fa-big { font-size: 24px; font-weight: 700; line-height: 1.5; }
  .card-hint { font-size: 12.5px; color: #6b6558; margin-top: 12px; }
  .card-de-big { font-family: 'Fraunces', Georgia, serif; font-size: 27px; font-weight: 600; direction: ltr; line-height: 1.35; }
  .card-fa-small { font-size: 13.5px; color: #8a8375; margin-top: 12px; }

  .answer-row { display: flex; gap: 10px; }
  .answer-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-family: 'Vazirmatn', Tahoma, sans-serif; font-weight: 700; font-size: 14.5px; cursor: pointer; }
  .answer-correct { background: var(--sage); color: #16241a; }
  .answer-wrong { background: var(--wine); color: #2a1414; }

  .manage-row { display: flex; align-items: center; gap: 10px; padding: 11px 12px; border-bottom: 1px solid var(--divider); }
  .manage-row:last-child { border-bottom: none; }
  .box-chip { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', Consolas, monospace; font-size: 12px; color: #201a10; font-weight: 700; flex-shrink: 0; }
  .manage-text { flex: 1; min-width: 0; }
  .manage-de { font-family: 'Fraunces', Georgia, serif; direction: ltr; font-size: 14px; }
  .manage-fa { color: var(--brass); font-size: 12.5px; margin-top: 2px; }
  .manage-when { font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .del-btn { background: none; border: none; color: var(--placeholder); cursor: pointer; padding: 6px; flex-shrink: 0; }
  .confirm-row { display: flex; gap: 6px; flex-shrink: 0; }
  .confirm-row button { font-size: 11px; padding: 5px 9px; border-radius: 6px; border: none; cursor: pointer; font-family: 'Vazirmatn', Tahoma, sans-serif; }

  .stats-title { font-family: 'Fraunces', Georgia, serif; font-size: 17px; font-weight: 600; margin-bottom: 12px; }
  .stats-row { display: flex; gap: 10px; margin-bottom: 12px; }
  .stats-num-box { flex: 1; background: var(--panel2); border-radius: 10px; padding: 12px; text-align: center; }
  .stats-num { font-family: 'JetBrains Mono', Consolas, monospace; font-size: 21px; font-weight: 600; color: var(--text); }
  .stats-bar-track { height: 8px; background: var(--panel2); border-radius: 5px; overflow: hidden; }
  .stats-bar-fill { height: 100%; }

  /* daily goal progress */
  .goal-progress { background: var(--panel2); border: 1px solid var(--border2); border-radius: 12px; padding: 10px 12px; margin-bottom: 16px; transition: border-color 0.2s ease; }
  .goal-progress.reached { border-color: var(--sage); }
  .goal-progress-head { display: flex; align-items: center; justify-content: space-between; font-size: 11.5px; color: var(--muted); margin-bottom: 6px; gap: 8px; }
  .goal-progress-head span:first-child { display: flex; align-items: center; gap: 5px; }
  .goal-progress-head span:last-child { font-family: 'JetBrains Mono', Consolas, monospace; color: var(--text); flex-shrink: 0; }
  .goal-progress-track { height: 6px; background: var(--panel); border-radius: 4px; overflow: hidden; }
  .goal-progress-fill { height: 100%; transition: width 0.4s ease; }
  .goal-progress-done { margin-top: 7px; font-size: 11.5px; color: var(--sage); text-align: center; }
  /* CSS فشرده‌تر برای هدف امروز */
  .goal-progress { padding: 6px 10px !important; margin-bottom: 8px !important; border-radius: 10px !important; }
  .goal-progress-head { font-size: 10px !important; margin-bottom: 3px !important; }
  .goal-progress-track { height: 4px !important; }

  .daily-goals-list { display: flex; flex-direction: column; gap: 12px; }
  .daily-goal-row-head { display: flex; align-items: center; justify-content: space-between; font-size: 12.5px; margin-bottom: 5px; }
  .daily-goal-row-head span:last-child { font-family: 'JetBrains Mono', Consolas, monospace; color: var(--muted); }

  .goal-setting-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--divider); }
  .goal-setting-row:last-child { border-bottom: none; padding-bottom: 0; }
  .goal-setting-label { font-size: 13.5px; font-weight: 700; }
  .goal-setting-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .goal-setting-input { width: 60px; flex-shrink: 0; background: var(--panel2); border: 1px solid var(--border2); border-radius: 10px; color: var(--text); padding: 8px 4px; text-align: center; font-family: 'JetBrains Mono', Consolas, monospace; font-size: 16px; }

  /* AI example-sentence generator (word box) */
  .ai-sentence-box { margin-top: 14px; }
  .ai-sentence-btn { width: 100%; background: linear-gradient(180deg, #9B7EC4, #6f5798); color: #fff; border: none; border-radius: 12px; padding: 13px; font-family: 'Vazirmatn', Tahoma, sans-serif; font-weight: 700; font-size: 13.5px; cursor: pointer; }
  .ai-sentence-btn:disabled { opacity: 0.6; cursor: default; }
  .ai-sentence-error { margin-top: 10px; padding: 10px 12px; background: rgba(182,92,92,0.14); color: var(--wine); border-radius: 10px; font-size: 12.5px; text-align: center; line-height: 1.8; }
  .ai-sentence-result { margin-top: 12px; background: var(--panel2); border: 1px solid var(--border2); border-radius: 14px; padding: 14px; }
  .ai-sentence-label { font-size: 10.5px; color: var(--violet); font-weight: 700; }
  .ai-sentence-de { direction: ltr; text-align: left; font-family: 'JetBrains Mono', Consolas, monospace; font-size: 14.5px; line-height: 1.7; color: var(--text); margin-top: 4px; }
  .ai-sentence-fa { font-size: 13.5px; line-height: 1.9; color: var(--text); margin-top: 4px; }

/* نشان کوچک سطح کنار عنوان «جعبه کلمه» */

.level-badge-chip:active { transform: scale(0.95); }

/* دایره رنگی + متن سطح در پروفایل، کنار تاریخ تولد */
.profile-level-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding: 8px 10px; background: var(--panel2); border: 1px solid var(--border2); border-radius: 10px; cursor: pointer; }

.profile-level-text { font-size: 12.5px; color: var(--text); }

/* کارت‌های سطح در پنجره «سطح زبان‌آموزی شما» */
.level-roadmap-list { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
.level-card-item { background: var(--panel2); border: 1px solid var(--border2); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.level-card-item.active-level { border-color: var(--brass); box-shadow: 0 0 10px rgba(201,166,107,0.15); }
.level-card-item.locked-level { opacity: 0.6; }
.level-card-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.level-card-title { font-weight: 700; font-size: 14px; color: var(--text); }
.level-btn-claim { background: linear-gradient(180deg, var(--brass), var(--brass-dark)); color: #201a10; border: none; border-radius: 8px; padding: 7px 12px; font-family: inherit; font-size: 11.5px; font-weight: 700; cursor: pointer; }
.level-btn-claim:disabled { opacity: 0.6; cursor: default; }
.level-btn-claimed { background: rgba(143,163,122,0.2); color: var(--sage); border: 1px solid var(--sage); border-radius: 8px; padding: 6px 10px; font-size: 11px; white-space: nowrap; display: inline-block; }
.level-btn-locked { background: var(--panel); color: var(--muted); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 11px; white-space: nowrap; }
.level-btn-coming-soon { background: rgba(139,111,201,0.15); color: var(--violet); border: 1px solid var(--violet); border-radius: 8px; padding: 6px 10px; font-size: 11px; white-space: nowrap; }

/* اطلاعات تکمیلی کلمات دوره‌ای در پشت کارت مرور */
.card-meta-box { margin-top: 10px; padding: 6px 12px; background: rgba(255,255,255,0.05); border-radius: 10px; font-size: 11px; color: var(--muted); display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

<div id="splash">

    </div>
  </div>

<div id="app"></div>

<!-- Firebase auth overlay: sits on top of the app, never replaces it. Guest/offline use is always possible. -->
<div id="auth-overlay" class="hide">
  <div class="auth-card">
    <div id="auth-loading-box">
      <div class="auth-spinner"></div>
      <div class="auth-sub">در حال بررسی وضعیت ورود...</div>

      <form class="auth-form" onsubmit="handleAuthSubmit(event, 'login')">
        <input type="email" id="auth-email" class="auth-input" placeholder="ایمیل" required autocomplete="email">
        <input type="password" id="auth-password" class="auth-input" placeholder="رمز عبور" required autocomplete="current-password">
        <button type="submit" class="btn-primary">ورود</button>

      <div id="auth-error-msg" class="auth-error"></div>
    </div>

    <div id="auth-signup-box" style="display:none;">

      <form class="auth-form" onsubmit="handleAuthSubmit(event, 'signup')">

  function friendById(id){ return FRIENDS.find(f => f.id === id); }
  function friendAvatarImg(avatarId, size){
    const src = AVATAR_IMAGES[avatarId] || AVATAR_IMAGES.a1;
    return `<img src="${src}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;display:block">`;
  }
  function goFriends(){ stopListening(); state.view = 'friends'; state.openFriendId = null; render(); }
  function openFriendProfile(id){ state.openFriendId = id; render(); }
  function closeFriendProfile(){ state.openFriendId = null; render(); }

  // --- درخواست‌های دوستی + چت واقعی (چون سرور نیست، فعلاً همه‌چیز محلی روی خود گوشی شبیه‌سازی می‌شه) ---
  function loadFriendData(){
    try { state.friendRequests = JSON.parse(localStorage.getItem(FRIEND_REQUESTS_KEY) || '[]'); } catch(e){ state.friendRequests = []; }
    try {
      const raw = JSON.parse(localStorage.getItem(USER_FRIENDS_KEY) || '[]');
      // سازگاری با نسخه‌ی قبلی که فقط نام کاربری خام ذخیره می‌کرد، یا رکوردهایی که فیلدهای جدیدتر رو نداشتن
      state.userFriends = raw.map(f => {
        const username = typeof f === 'string' ? f : f.username;
        return { ...makeFriendRecord(username), ...(typeof f === 'string' ? {} : f) };
      });
    } catch(e){ state.userFriends = []; }
    try { state.chats = JSON.parse(localStorage.getItem(CHATS_KEY) || '{}'); } catch(e){ state.chats = {}; }
    try { state.blockedUsers = JSON.parse(localStorage.getItem(BLOCKED_USERS_KEY) || '[]'); } catch(e){ state.blockedUsers = []; }
  }
  function persistFriendRequests(){ try { localStorage.setItem(FRIEND_REQUESTS_KEY, JSON.stringify(state.friendRequests)); } catch(e){} }
  function persistUserFriends(){ try { localStorage.setItem(USER_FRIENDS_KEY, JSON.stringify(state.userFriends)); } catch(e){} }
  function persistChats(){ try { localStorage.setItem(CHATS_KEY, JSON.stringify(state.chats)); } catch(e){} }
  function persistBlockedUsers(){ try { localStorage.setItem(BLOCKED_USERS_KEY, JSON.stringify(state.blockedUsers)); } catch(e){} }

  // چون سرور نیست، برای دوستِ تازه‌قبول‌شده یک رکورد نمایشی با مقادیر پیش‌فرض می‌سازیم.
  // فیلدهای زیر (curriculumLevel, age, totalCards, reviewedToday) فعلاً placeholder هستن؛
  // وقتی سرور واقعی اضافه بشه، فقط کافیه این مقادیر از پاسخ سرور پر بشن و بقیه UI خودکار کار می‌کنه.
  function makeFriendRecord(username){
    return { id: username, username, name: username, avatar: null, bio: null, correctCount: 0, streak: 0, league: 'برنز', curriculumLevel: null, age: null, totalCards: 0, reviewedToday: 0 };
  }
  function userFriendByUsername(username){ return state.userFriends.find(f => f.username === username); }

  // مرحله‌ی جستجو: قبل از ارسال درخواست، یک کارت پیش‌نمایش نشون می‌دیم
  function previewFriendSearch(){
    const input = document.getElementById('friendSearchInput');
    const username = input ? input.value.trim() : '';
    state.friendSearchPreview = username || null;
    render();
  }
  function closeFriendSearchPreview(){ state.friendSearchPreview = null; render(); }
  // شبیه‌سازی ارسال درخواست دوستی (چون سرور نیست، مستقیماً به لیست خودمون اضافه می‌کنیم تا تست بشه)
  function confirmSendFriendRequest(){
    const username = state.friendSearchPreview;
    if (!username) return;
    if (!state.friendRequests.includes(username)){
      state.friendRequests.push(username);
      persistFriendRequests();
    }
    state.friendSearchPreview = null;
    const input = document.getElementById('friendSearchInput');
    if (input) input.value = '';
    alert(`درخواست دوستی برای «${username}» ارسال شد. (چون این نسخه هنوز سرور نداره، برای تست به زنگوله اضافه شد)`);
    render();
  }
  function openRequestsModal(){ state.showRequestsModal = true; render(); }
  function closeRequestsModal(){ state.showRequestsModal = false; render(); }
  function acceptFriendRequest(username){
    if (!userFriendByUsername(username)){
      state.userFriends.push(makeFriendRecord(username));
      persistUserFriends();
    }
    rejectFriendRequest(username);
  }
  function rejectFriendRequest(username){
    state.friendRequests = state.friendRequests.filter(u => u !== username);
    persistFriendRequests();
    render();
  }
  function openUserChat(username){
    state.openChatUsername = username;
    state.openUserFriendProfile = null;
    render();
  }
  function closeUserChat(){
    state.openChatUsername = null;
    render();
  }
  function openUserFriendProfile(username){ state.openUserFriendProfile = username; render(); }
  function closeUserFriendProfile(){ state.openUserFriendProfile = null; render(); }
  function blockUser(username){
    if (!confirm(`«${username}» بلاک بشه؟ دیگه توی لیست دوستانتون نمی‌بینیدش.`)) return;
    if (!state.blockedUsers.includes(username)){
      state.blockedUsers.push(username);
      persistBlockedUsers();
    }
    state.userFriends = state.userFriends.filter(f => f.username !== username);
    persistUserFriends();
    state.friendRequests = state.friendRequests.filter(u => u !== username);
    persistFriendRequests();
    state.openUserFriendProfile = null;
    render();
  }
  function removeFriend(username){
    state.userFriends = state.userFriends.filter(f => f.username !== username);
    persistUserFriends();
    state.openUserFriendProfile = null;
    render();
  }
  function sendUserChatMessage(){
    const input = document.getElementById('userChatInput');
    const text = input ? input.value.trim() : '';
    const user = state.openChatUsername;
    if (!text || !user) return;
    if (!state.chats[user]) state.chats[user] = [];
    state.chats[user].push({ sender: 'me', text });
    // شبیه‌سازی جواب آفلاین برای تست کارکرد چت، چون سرور وصل نیست
    state.chats[user].push({ sender: 'friend', text: 'این یک جواب تستی است چون سرور وصل نیست!' });
    persistChats();
    render();
    const msgsEl = document.getElementById('userChatMessages');
    if (msgsEl) msgsEl.scrollTop = msgsEl.scrollHeight;
  }
  function handleUserChatInputKeydown(e){
    if (e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendUserChatMessage();
    }
  }

  function loadProfile(){
    try {
      const raw = localStorage.getItem(PROFILE_KEY);
      const p = raw ? JSON.parse(raw) : null;
      state.profile = {
        name: (p && p.name) || '', avatar: (p && p.avatar) || 'a1', customAvatar: (p && p.customAvatar) || null,
        userId: (p && p.userId) || '',
        // سازگاری با نسخه‌ی قبلی که فقط یک قفلِ یک‌بار-قابل‌تغییر (userIdLocked) داشت
        userIdChangeCount: (p && typeof p.userIdChangeCount === 'number') ? p.userIdChangeCount : (p && p.userIdLocked ? 1 : 0),
        bio: (p && p.bio) || '', gender: (p && p.gender) || '', birthdate: (p && p.birthdate) || '',
      };
    } catch(e){ state.profile = { name: '', avatar: 'a1', customAvatar: null, userId: '', userIdChangeCount: 0, bio: '', gender: '', birthdate: '' }; }
  }
  function persistProfile(){ try { localStorage.setItem(PROFILE_KEY, JSON.stringify(state.profile)); } catch(e){} }
  function setProfileName(v){ state.profile.name = v; persistProfile(); }
  function setProfileBio(v){ state.profile.bio = v; persistProfile(); }
  function selectGender(g){ state.profile.gender = state.profile.gender === g ? '' : g; persistProfile(); render(); }
  function setProfileBirthdate(v){ state.profile.birthdate = v; persistProfile(); }

  // ===== سیستم آیدی کاربری (Leitner ID) =====
  // قوانین: حداقل ۶ کاراکتر، حداقل یک حرف بزرگ انگلیسی (A-Z)، حداکثر ۲ بار قابل تغییر.
  // نکته‌ی مهم: این اپ فعلاً سرور نداره، پس یکتا بودن آیدی بین همه‌ی کاربرا فقط وقتی
  // تضمین می‌شه که checkUserIdAvailability به یه سرویس/دیتابیس آنلاین وصل بشه (پایین‌تر).
  // تا اون موقع، فقط قفلِ محلیِ «حداکثر ۲ بار قابل تغییر» رعایت می‌شه.
  const USER_ID_MIN_LEN = 6;
  const USER_ID_MAX_CHANGES = 2;
  // آدرس سرویس آنلاینِ آینده (وقتی برنامه آنلاین شد، این مقدار رو با آدرس واقعی API عوض کن).
  const USER_ID_API_BASE = ''; // مثلاً: 'https://your-backend.example.com'

  function validateUserIdFormat(v){
    const val = String(v || '').trim();
    if (val.length < USER_ID_MIN_LEN) return 'profileIdErrLength';
    if (!/[A-Z]/.test(val)) return 'profileIdErrUpper';
    if (/\s/.test(val)) return 'profileIdErrSpace';
    return '';
  }

  // این تابع الان فقط یه استاب محلیه. وقتی سرویس آنلاین آماده شد، کافیه بدنه‌ی این
  // تابع رو با یه فراخوانی واقعی به سرور جایگزین کنی؛ بقیه‌ی کد (confirmUserId) دست‌نخورده می‌مونه.
  async function checkUserIdAvailability(id){
    if (!USER_ID_API_BASE){
      // هنوز به سرویس آنلاین وصل نشدیم -> فعلاً همیشه در دسترس فرض می‌شه.
      return true;
    }
    try {
      const res = await fetch(`${USER_ID_API_BASE}/api/user-ids/${encodeURIComponent(id)}/available`);
      if (!res.ok) return true; // در صورت خطای سرور، مانع ثبت محلی نشو
      const data = await res.json();
      return data && data.available !== false;
    } catch(e){ return true; }
  }

  function onUserIdDraftInput(v){
    state.uiUserIdDraft = v;
    if (state.uiUserIdError) { state.uiUserIdError = ''; render(); }
  }

  async function confirmUserId(){
    if (state.profile.userIdChangeCount >= USER_ID_MAX_CHANGES || state.uiUserIdChecking) return;
    const val = String(state.uiUserIdDraft || '').trim();
    const errKey = validateUserIdFormat(val);
    if (errKey){ state.uiUserIdError = errKey; render(); return; }
    state.uiUserIdChecking = true;
    state.uiUserIdError = '';
    render();
    const available = await checkUserIdAvailability(val);
    state.uiUserIdChecking = false;
    if (!available){ state.uiUserIdError = 'profileIdTaken'; render(); return; }
    state.profile.userId = val;
    state.profile.userIdChangeCount = (state.profile.userIdChangeCount || 0) + 1;
    state.uiUserIdDraft = '';
    persistProfile();
    render();
  }
  function setProfileAvatar(id){ state.profile.avatar = id; state.profile.customAvatar = null; persistProfile(); render(); }
  function openAvatarModal(){ state.showAvatarModal = true; render(); }
  function closeAvatarModal(){ state.showAvatarModal = false; render(); }
  function pickProfileAvatar(id){ setProfileAvatar(id); state.showAvatarModal = false; render(); }
  function onAvatarFileChange(input){
    const file = input.files && input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e){
      const img = new Image();
      img.onload = function(){
        const size = 200;
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        const s = Math.min(img.width, img.height);
        const sx = (img.width - s) / 2, sy = (img.height - s) / 2;
        ctx.drawImage(img, sx, sy, s, s, 0, 0, size, size);
        try {
          state.profile.customAvatar = canvas.toDataURL('image/jpeg', 0.85);
          persistProfile();
        } catch(err){}
        render();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }
  function avatarHtml(size){
    if (state.profile && state.profile.customAvatar){
      return `<img src="${state.profile.customAvatar}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;display:block">`;
    }
    const av = DEFAULT_AVATARS.find(a => state.profile && a.id === state.profile.avatar) || DEFAULT_AVATARS[0];
    const src = AVATAR_IMAGES[av.id] || AVATAR_IMAGES.a1;
    return `<img src="${src}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;display:block">`;
  }

  // --- لول و لیگ ---
  // هر جواب درست (کلمه/جمله/تلفظ) ۱ امتیاز تجربه (XP) می‌ده.
  // XP لازم برای رفتن از لول n به n+1 به‌تدریج زیاد می‌شه تا نه خیلی راحت باشه نه خیلی سخت:
  // لول ۱->۲: ۲۰ جواب درست، لول ۲->۳: ۲۸، لول ۳->۴: ۳۶ و به همین ترتیب (+۸ به ازای هر لول).
  function xpNeededForLevel(level){ return 20 + (level - 1) * 8; }
  function computeLevelInfo(totalXp){
    let level = 1, remaining = Math.max(0, totalXp || 0);
    while (remaining >= xpNeededForLevel(level)){ remaining -= xpNeededForLevel(level); level++; }
    return { level, xpIntoLevel: remaining, xpForNext: xpNeededForLevel(level) };
  }
  function totalXp(){ return state.stats.word.correct + state.stats.sentence.correct + state.stats.pronun.correct; }
  // سطح زبانی (مبتدی/A1/A2/B1/B2+) بر اساس تعداد پاسخ‌های درستِ همون زبان — چون state.stats مخصوص زبان فعلیه، این خودش جدا-جدا برای هر زبانه
  function langLevelLabel(correctCount){
    if (correctCount < 100) return 'مبتدی';
    if (correctCount < 250) return 'A1';
    if (correctCount < 500) return 'A2';
    if (correctCount < 1000) return 'B1';
    return 'B2+';
  }
  function currentLangLevelLabel(){ return langLevelLabel(totalXp()); }

  // ===================================================================
  // سطح‌بندی زبان‌آموزی بر اساس «کلمات دوره‌ای» (A0 → A1 → A2 → B1 → B2)
  // این سیستم کاملاً مستقل از لیگ/XP هست. کلمات هر سطح تا رسیدن رسمی به
  // اون سطح قفل هستن (به‌جز A0 که ۲۵۰ کلمه رندوم از A1 آزاده).
  // شرط‌ها بر پایه تعداد «تجمعی» پاسخ‌های درستِ همون سطح کلمه‌ست (نه کل).
  // ===================================================================
  const CURRICULUM_STAGE_ORDER = ['A0', 'A1', 'A2', 'B1', 'B2'];
  const CURRICULUM_STAGE_COLOR = { A0: '#c9793a', A1: '#9aa0b4', A2: '#e0b84a', B1: '#6bb0a8', B2: '#3fc1c9' };
  const CURRICULUM_FILES = { A1: 'words_a1.json', A2: 'words_a2.json', B1: 'words_b1.json' };
  const CURRICULUM_A0_UNLOCK_COUNT = 250;
  // هر مرحله: شرط‌های تجمعی لازم برای ارتقا از مرحله قبل، و اینکه با رسیدن به این مرحله کدوم سطح‌ها یکجا باز می‌شن
  const CURRICULUM_REQUIREMENTS = {
    A1: { correctA1: 100 },
    A2: { correctA1: 200 },
    B1: { correctA2: 300, correctA1: 150 },
    B2: { correctB1: 500, correctA2: 300, correctA1: 200 }
  };
  const CURRICULUM_SUPPORTED_LANG = 'de'; // دیتای کلمات فعلاً فقط برای آلمانی موجوده

  function curriculumIsSupported(){ return currentTargetLangCode() === CURRICULUM_SUPPORTED_LANG; }

  function curriculumStageDisplayName(stage){ return stage; }

  function curriculumMeetsRequirement(prog, reqs){
    if (reqs.correctA1 !== undefined && prog.correctA1 < reqs.correctA1) return false;
    if (reqs.correctA2 !== undefined && prog.correctA2 < reqs.correctA2) return false;
    if (reqs.correctB1 !== undefined && prog.correctB1 < reqs.correctB1) return false;
    return true;
  }

  // بر اساس شمارنده‌های تجمعی، مرحله واقعی کاربر رو محاسبه می‌کنه (بدون نیاز به state.stage قبلی)
  function computeCurriculumStage(prog){
    let stage = 'A0';
    for (const s of ['A1','A2','B1','B2']) {
      if (curriculumMeetsRequirement(prog, CURRICULUM_REQUIREMENTS[s])) stage = s; else break;
    }
    return stage;
  }

  async function ensureCurriculumWordsLoaded(levelKey){
    const file = CURRICULUM_FILES[levelKey];
    if (!file) return null;
    if (state.curriculumWords[levelKey]) return state.curriculumWords[levelKey];
    state.curriculumLoadStatus[levelKey] = 'loading';
    render();
    try {
      const res = await fetch(file);
      if (!res.ok) throw new Error('fetch failed: ' + res.status);
      const data = await res.json();
      state.curriculumWords[levelKey] = Array.isArray(data) ? data : [];
      state.curriculumLoadStatus[levelKey] = 'loaded';
      return state.curriculumWords[levelKey];
    } catch(e) {
      console.error(e);
      state.curriculumLoadStatus[levelKey] = 'error';
      return null;
    } finally {
      render();
    }
  }

  function curriculumCategoryName(levelKey){ return `${levelKey} (${targetLangLabel()})`; }
  function findOrCreateCurriculumCategory(levelKey){
    const name = curriculumCategoryName(levelKey);
    let cat = state.categories.find(c => c.name === name);
    if (!cat) {
      cat = { id: `cat-curr-${levelKey}-${Date.now()}-${Math.random().toString(36).slice(2,7)}`, name, createdAt: new Date().toISOString() };
      state.categories = [...state.categories, cat];
      persistCategories();
    }
    return cat;
  }

  function addCurriculumCardsToBox(levelKey, wordItems){
    if (!wordItems || wordItems.length === 0) return 0;
    const cat = findOrCreateCurriculumCategory(levelKey);
    // فقط داخل همون سطح (categoryId یکسان) تکراری رو رد می‌کنیم؛ یه کلمه مثل «Hund» می‌تونه هم
    // توی دسته A1 هم توی دسته A2 جدا وجود داشته باشه چون فایل‌های سطح با هم هم‌پوشانی دارن.
    const existingDeInThisLevel = new Set(
      state.cards.filter(c => c.type === 'word' && c.categoryId === cat.id).map(c => (c.de||'').trim().toLowerCase())
    );
    const now = Date.now();
    const nowIso = new Date().toISOString();
    const today = todayStr();
    let addedCount = 0;
    const newCards = [];
    wordItems.forEach((w, i) => {
      const deText = (w.de || '').trim();
      if (!deText || existingDeInThisLevel.has(deText.toLowerCase())) return;
      existingDeInThisLevel.add(deText.toLowerCase());
      newCards.push({
        id: `curr-${levelKey}-${w.id || i}-${now}`,
        type: 'word',
        de: deText,
        fa: w.fa || '',
        box: 1,
        nextReview: today,
        createdAt: nowIso,
        categoryId: cat.id,
        curriculumLevel: levelKey,
        curriculumCategory: w.category || '',
        curriculumFreqText: w.frequencyText || '',
        curriculumFreqPercent: (typeof w.frequencyPercent === 'number') ? w.frequencyPercent : null,
        curriculumContextDe: w.contextDe || '',
        curriculumContextFa: w.contextFa || ''
      });
      addedCount++;
    });
    if (newCards.length > 0) {
      state.cards = [...state.cards, ...newCards];
      persistCards();
    }
    return addedCount;
  }

  // اجرای آزادسازی کلمات لازم برای یک مرحله (اگه قبلاً باز نشده باشن)
  async function unlockCurriculumStageWords(stage, prog){
    if (!prog.categoriesCreated) prog.categoriesCreated = {};
    if (stage === 'A0') {
      if (prog.categoriesCreated.A0) return;
      const words = await ensureCurriculumWordsLoaded('A1');
      if (!words) return;
      const shuffled = [...words].sort(() => Math.random() - 0.5);
      const picked = shuffled.slice(0, Math.min(CURRICULUM_A0_UNLOCK_COUNT, words.length));
      prog.unlockedA1Ids = picked.map(w => w.id);
      addCurriculumCardsToBox('A1', picked);
      prog.categoriesCreated.A0 = true;
      return;
    }
    if (stage === 'A1') {
      if (prog.categoriesCreated.A1) return;
      const words = await ensureCurriculumWordsLoaded('A1');
      if (!words) return;
      // کل A1 (۵۰۰ تا) آزاد میشه؛ ۲۵۰ تای اول قبلاً اضافه شدن، فقط بقیه‌ش اضافه میشه (addCurriculumCardsToBox خودش تکراری رو رد میکنه)
      addCurriculumCardsToBox('A1', words);
      prog.categoriesCreated.A1 = true;
      return;
    }
    if (stage === 'A2') {
      if (prog.categoriesCreated.A2) return;
      const words = await ensureCurriculumWordsLoaded('A2');
      if (!words) return;
      addCurriculumCardsToBox('A2', words);
      prog.categoriesCreated.A2 = true;
      return;
    }
    if (stage === 'B1') {
      if (prog.categoriesCreated.B1) return;
      const words = await ensureCurriculumWordsLoaded('B1');
      if (!words) return;
      addCurriculumCardsToBox('B1', words);
      prog.categoriesCreated.B1 = true;
      return;
    }
    // B2: فایل کلمات هنوز موجود نیست، کاری برای آزادسازی نیست
  }

  // بعد از هر تغییر در شمارنده‌های تجمعی صدا زده میشه: مرحله جدید رو حساب می‌کنه،
  // اگه بالا رفته بود کلمات مرحله‌های جدید رو به‌ترتیب آزاد می‌کنه.
  async function recomputeCurriculumStage(){
    if (!curriculumIsSupported()) return;
    const prog = curriculumProgressForLang();
    const newStage = computeCurriculumStage(prog);
    const oldIdx = CURRICULUM_STAGE_ORDER.indexOf(prog.stage || 'A0');
    const newIdx = CURRICULUM_STAGE_ORDER.indexOf(newStage);
    if (newIdx > oldIdx) {
      // به ترتیب همه مرحله‌های بینابین رو هم آزاد می‌کنیم (برای اطمینان از پیوستگی)
      for (let i = oldIdx + 1; i <= newIdx; i++) {
        await unlockCurriculumStageWords(CURRICULUM_STAGE_ORDER[i], prog);
      }
      prog.stage = newStage;
      persistCurriculumProgressState();
      render();
    }
  }

  // اولین بار که کاربر وارد یک زبان پشتیبانی‌شده می‌شه، A0 (۲۵۰ کلمه رندوم A1) رو فعال می‌کنه
  async function ensureCurriculumBootstrapped(){
    if (!curriculumIsSupported()) return;
    const prog = curriculumProgressForLang();
    if (!prog.categoriesCreated || !prog.categoriesCreated.A0) {
      await unlockCurriculumStageWords('A0', prog);
      persistCurriculumProgressState();
      render();
    }
  }

  function openLevelRoadmapModal(){ state.showLevelRoadmapModal = true; ensureCurriculumBootstrapped(); render(); }
  function closeLevelRoadmapModal(){ state.showLevelRoadmapModal = false; render(); }

  function renderLevelBadge(){
    if (!curriculumIsSupported()) return '';
    const prog = curriculumProgressForLang();
    const stage = prog.stage || 'A0';
    const color = CURRICULUM_STAGE_COLOR[stage] || 'var(--brass)';
    return `<button class="level-badge-chip" style="border-color:${color};color:${color}" onclick="openLevelRoadmapModal()" title="سطح زبان‌آموزی شما بر اساس کلمات دوره‌ای">${esc(stage)}</button>`;
  }

  // برای نمایش در پروفایل: دایره رنگی + نام سطح
  function renderProfileLevelBadge(){
    if (!curriculumIsSupported()) {
      return `<div class="profile-level-row" onclick="openLevelRoadmapModal()"><span class="profile-level-dot" style="background:var(--muted)"></span><span class="profile-level-text">سطح زبان: به‌زودی برای ${esc(targetLangLabel())}</span></div>`;
    }
    const prog = curriculumProgressForLang();
    const stage = prog.stage || 'A0';
    const color = CURRICULUM_STAGE_COLOR[stage] || 'var(--brass)';
    return `<div class="profile-level-row" onclick="openLevelRoadmapModal()"><span class="profile-level-dot" style="background:${color}"></span><span class="profile-level-text">سطح زبان: <b style="color:${color}">${esc(stage)}</b></span></div>`;
  }

  function curriculumRequirementRowsHtml(reqs, prog){
    const parts = [];
    if (reqs.correctA1 !== undefined) parts.push({ label: 'A1', done: Math.min(prog.correctA1, reqs.correctA1), need: reqs.correctA1 });
    if (reqs.correctA2 !== undefined) parts.push({ label: 'A2', done: Math.min(prog.correctA2, reqs.correctA2), need: reqs.correctA2 });
    if (reqs.correctB1 !== undefined) parts.push({ label: 'B1', done: Math.min(prog.correctB1, reqs.correctB1), need: reqs.correctB1 });
    return parts.map(p => {
      const pct = Math.round((p.done / p.need) * 100);
      return `
        <div class="daily-goal-row">
          <div class="daily-goal-row-head"><span>پاسخ درست از ${esc(p.label)}</span><span>${faNum(p.done)} / ${faNum(p.need)}</span></div>
          <div class="goal-progress-track"><div class="goal-progress-fill" style="width:${pct}%;background:${CURRICULUM_STAGE_COLOR[p.label]||'var(--brass)'}"></div></div>
        </div>
      `;
    }).join('');
  }

  function renderLevelRoadmapModal(){
    if (!state.showLevelRoadmapModal) return '';
    const supported = curriculumIsSupported();
    const prog = curriculumProgressForLang();
    const stage = prog.stage || 'A0';

    const rows = CURRICULUM_STAGE_ORDER.map(s => {
      const isCurrent = stage === s;
      const stageIdx = CURRICULUM_STAGE_ORDER.indexOf(s);
      const currentIdx = CURRICULUM_STAGE_ORDER.indexOf(stage);
      const isPast = stageIdx <= currentIdx;
      const reqs = CURRICULUM_REQUIREMENTS[s];
      const hasFile = s === 'A0' || !!CURRICULUM_FILES[s];

      let body;
      if (!supported) {
        body = `<span class="level-btn-coming-soon">⏳ به‌زودی برای ${esc(targetLangLabel())}</span>`;
      } else if (s === 'A0') {
        body = `<span class="level-btn-claimed">${isPast ? '✓ فعال — ۲۵۰ کلمه رندوم از A1 باز است' : ''}</span>`;
      } else if (!hasFile) {
        body = `<span class="level-btn-coming-soon">⏳ در آپدیت بعدی اضافه می‌شود</span>`;
      } else if (isPast) {
        body = `<span class="level-btn-claimed">✓ به این سطح رسیده‌اید — همه کلمات باز است</span>`;
      } else {
        body = curriculumRequirementRowsHtml(reqs, prog);
      }

      return `
        <div class="level-card-item ${isCurrent ? 'active-level' : ''} ${(!isPast || !supported) ? 'locked-level' : ''}">
          <div class="level-card-head">
            <span class="level-card-title">سطح ${esc(s)}${isCurrent ? ' (سطح فعلی شما)' : ''}</span>
          </div>
          <div>${body}</div>
        </div>
      `;
    }).join('');

    return `
      <div class="modal-backdrop" onclick="closeLevelRoadmapModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
          <div class="deck-header" style="margin-bottom:2px">
            <span class="deck-title">${icon('book',16)} سطح زبان‌آموزی شما</span>
            <button class="modal-close-btn" onclick="closeLevelRoadmapModal()">${icon('close',15)}</button>
          </div>
          <div class="hint-text" style="margin-bottom:6px">
            ${supported
              ? `این سطح فقط با پاسخ درست به کلمات همین دوره (A1 تا B1) بالا می‌رود. با رسیدن به هر سطح، همه کلمات آن سطح به‌طور خودکار باز می‌شوند.`
              : `دیتای آماده کلمات فعلاً فقط برای زبان آلمانی موجود است. زبان فعلی شما: ${esc(targetLangLabel())}`}
          </div>
          <div class="level-roadmap-list">${rows}</div>
        </div>
      </div>
    `;
  }

  const LEAGUES = [
    { key: 'bronze', from: 1, to: 5, color: '#c9793a' },
    { key: 'silver', from: 6, to: 10, color: '#9aa0b4' },
    { key: 'gold', from: 11, to: 15, color: '#e0b84a' },
    { key: 'platinum', from: 16, to: 20, color: '#6bb0a8' },
    { key: 'diamond', from: 21, to: 25, color: '#3fc1c9' },
    { key: 'master', from: 26, to: Infinity, color: '#8B6FC9' },
  ];
  function leagueFor(level){ return LEAGUES.find(l => level >= l.from && level <= l.to) || LEAGUES[LEAGUES.length - 1]; }
  function leagueLabel(key){ return t('league' + key.charAt(0).toUpperCase() + key.slice(1)); }

  // --- زبان رابط کاربری برنامه (UI) ---
  const UI_LANGUAGE_META = {
    fa: { native: 'فارسی', dir: 'rtl' },
    en: { native: 'English', dir: 'ltr' },
    de: { native: 'Deutsch', dir: 'ltr' },
    es: { native: 'Español', dir: 'ltr' },
    fr: { native: 'Français', dir: 'ltr' },
    it: { native: 'Italiano', dir: 'ltr' },
  };
  function UI_LANGUAGES_FN(){
    const out = {};
    Object.keys(UI_LANGUAGE_META).forEach(code => { out[code] = { ...UI_LANGUAGE_META[code], label: t('lang_' + code) }; });
    return out;
  }
  const I18N = {
    fa: {
      appTitle: 'جعبه لایتنر',

  function parseInput(text){
    const lines = text.split('\n'); const parsed=[]; const failed=[];
    for (const raw of lines){
      const line = raw.trim();
      if (!line) continue;
      let sep = null;
      if (line.includes('\t')) sep = '\t';
      else if (line.includes(' - ')) sep = ' - ';
      else if (line.includes(' – ')) sep = ' – ';
      else if (line.includes(':')) sep = ':';
      else if (line.includes('=')) sep = '=';
      if (!sep) { failed.push(line); continue; }
      const idx = line.indexOf(sep);
      const de = line.slice(0, idx).trim();
      const fa = line.slice(idx + sep.length).trim();
      if (!de || !fa) { failed.push(line); continue; }
      parsed.push({ de, fa });
    }
    return { parsed, failed };
  }

    let h = hex.replace('#','');

    let r = (num>>16) & 0xFF, g = (num>>8) & 0xFF, b = num & 0xFF;
    r = Math.min(255, Math.max(0, Math.round(r + (percent/100)*255)));
    g = Math.min(255, Math.max(0, Math.round(g + (percent/100)*255)));
    b = Math.min(255, Math.max(0, Math.round(b + (percent/100)*255)));
    return '#' + [r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');

    }
  } catch (e) {
    console.error('Firebase init failed, continuing in local/guest mode', e);
  }

  // مسیر استاندارد ذخیره‌سازی در Realtime Database: users/{uid}/data
  function userDataRef(uid){ return fbDb.ref('users/' + uid + '/data'); }

  function showAuthOverlay(mode){
    const overlay = document.getElementById('auth-overlay');
    if (!overlay) return;
    overlay.classList.remove('hide');
    document.getElementById('auth-loading-box').style.display = mode === 'loading' ? 'block' : 'none';
    document.getElementById('auth-login-box').style.display = mode === 'login' ? 'block' : 'none';
    document.getElementById('auth-signup-box').style.display = mode === 'signup' ? 'block' : 'none';
  }
  function hideAuthOverlay(){
    const overlay = document.getElementById('auth-overlay');
    if (overlay) overlay.classList.add('hide');
  }
  function toggleAuthMode(mode){ showAuthOverlay(mode); }
  function continueAsGuest(){
    state.authGuest = true;

    hideAuthOverlay();
    render();

  function firebaseAuthErrorFa(code){
    switch (code) {
      case 'auth/email-already-in-use': return 'این ایمیل قبلاً ثبت‌نام شده. وارد شو یا از ایمیل دیگه‌ای استفاده کن.';
      case 'auth/invalid-email': return 'فرمت ایمیل درست نیست.';
      case 'auth/user-not-found':
      case 'auth/wrong-password':
      case 'auth/invalid-credential': return 'ایمیل یا رمز عبور اشتباهه.';
      case 'auth/weak-password': return 'رمز عبور باید حداقل ۶ کاراکتر باشه.';
      case 'auth/network-request-failed': return 'اتصال اینترنت برقرار نیست. می‌تونی بدون حساب هم ادامه بدی.';
      default: return 'یه خطایی پیش اومد. دوباره امتحان کن.';
    }
  }

  async function handleAuthSubmit(event, mode){
    event.preventDefault();
    if (!firebaseReady){ alert('اتصال به سرویس ورود برقرار نشد. فعلاً بدون حساب ادامه بده.'); return; }
    const errBoxId = mode === 'signup' ? 'auth-error-msg-signup' : 'auth-error-msg';
    const errBox = document.getElementById(errBoxId);
    errBox.style.display = 'none';
    const email = document.getElementById(mode === 'signup' ? 'signup-email' : 'auth-email').value.trim();
    const pass = document.getElementById(mode === 'signup' ? 'signup-password' : 'auth-password').value;
    try {
      if (mode === 'signup') await fbAuth.createUserWithEmailAndPassword(email, pass);
      else await fbAuth.signInWithEmailAndPassword(email, pass);
      // onAuthStateChanged handles the rest (hide overlay, merge/load data)
    } catch (e) {
      errBox.textContent = firebaseAuthErrorFa(e.code);
      errBox.style.display = 'block';
    }

  function signOutAccount(){
    if (!firebaseReady) return;
    fbAuth.signOut().catch(() => {});
    state.authUser = null;
    state.syncStatus = 'idle';
    render();

  function buildSyncPayload(){
    return {
      cards: state.cards, stats: state.stats, categories: state.categories,
      themeColor: state.themeColor, themeMode: state.themeMode, activityDays: state.activityDays,
      savedAt: new Date().toISOString()
    };
  }
  function applySyncData(data){
    if (!data) return;
    const cards = Array.isArray(data.cards) ? data.cards : [];
    state.cards = cards.map(c => ({ ...c, type: c.type==='sentence'?'sentence':'word', categoryId: c.categoryId || null }));
    state.stats = {
      word: {correct:(data.stats&&data.stats.word&&data.stats.word.correct)||0, wrong:(data.stats&&data.stats.word&&data.stats.word.wrong)||0},
      sentence: {correct:(data.stats&&data.stats.sentence&&data.stats.sentence.correct)||0, wrong:(data.stats&&data.stats.sentence&&data.stats.sentence.wrong)||0},
      pronun: {correct:(data.stats&&data.stats.pronun&&data.stats.pronun.correct)||0, wrong:(data.stats&&data.stats.pronun&&data.stats.pronun.wrong)||0}
    };
    state.categories = Array.isArray(data.categories) ? data.categories : [];
    state.activityDays = data.activityDays ? normalizeActivityDays(data.activityDays) : state.activityDays;
    try { localStorage.setItem(cardsKeyFor(currentTargetLangCode()), JSON.stringify(state.cards)); } catch(e){}
    try { localStorage.setItem(statsKeyFor(currentTargetLangCode()), JSON.stringify(state.stats)); } catch(e){}
    try { localStorage.setItem(categoriesKeyFor(currentTargetLangCode()), JSON.stringify(state.categories)); } catch(e){}
    try { localStorage.setItem(ACTIVITY_KEY, JSON.stringify(state.activityDays)); } catch(e){}
    if (data.themeColor){ state.themeColor = data.themeColor; try{localStorage.setItem(THEME_KEY, data.themeColor);}catch(e){} applyThemeColor(data.themeColor); }
    if (data.themeMode){ state.themeMode = data.themeMode; try{localStorage.setItem(THEME_MODE_KEY, data.themeMode);}catch(e){} applyThemeMode(data.themeMode); }
    render();
  }

  async function uploadSyncNow(){
    if (!firebaseReady || !state.authUser) return;
    await userDataRef(state.authUser.uid).set(buildSyncPayload());
  }

  // اولین لاگین: اگه هم روی گوشی داده هست و هم توی فایربیس، از کاربر می‌پرسیم کدوم رو نگه داره
  // (دقیقاً همون رفتار سیستم قبلی گوگل‌درایو، تا کاربر داده‌ای رو از دست نده)
  async function syncOnLogin(){
    if (!firebaseReady || !state.authUser) return;
    state.syncStatus = 'syncing';
    render();
    try {
      const snap = await userDataRef(state.authUser.uid).once('value');
      const remote = snap.exists() ? snap.val() : null;
      const hasLocalData = state.cards.length > 0;
      if (remote && hasLocalData) {
        const keepLocal = confirm('هم روی این گوشی و هم روی حسابت کارت وجود داره.\n\nOK بزن تا اطلاعات همین گوشی جایگزین نسخه‌ی حساب بشه.\nCancel بزن تا نسخه‌ی حساب بیاد روی این گوشی (اطلاعات فعلی این گوشی جایگزین می‌شه).');
        if (keepLocal) await uploadSyncNow();
        else applySyncData(remote);
      } else if (remote && !hasLocalData) {
        applySyncData(remote);
      } else {
        await uploadSyncNow();
      }
      state.syncStatus = 'synced';
      state.lastSyncAt = new Date().toISOString();
    } catch (e) {
      console.error(e);
      state.syncStatus = 'error';
    }
    render();
  }

  let syncDebounceTimer = null;
  function queueCloudSync(){
    if (!firebaseReady || !state.authUser) return;
    clearTimeout(syncDebounceTimer);
    syncDebounceTimer = setTimeout(() => {
      state.syncStatus = 'syncing'; render();
      uploadSyncNow().then(() => { state.syncStatus = 'synced'; state.lastSyncAt = new Date().toISOString(); render(); })
        .catch((e) => { console.error(e); state.syncStatus = 'error'; render(); });
    }, 2500);
  }

  function initAuthListener(){
    let wasGuest = false;
    try { wasGuest = localStorage.getItem(AUTH_GUEST_KEY) === '1'; } catch(e){}
    if (!firebaseReady) {
      // فایربیس لود نشده (مثلاً آفلاین) -> مستقیم برو توی حالت مهمان، اپ نباید قفل بشه
      state.authGuest = true;
      hideAuthOverlay();
      return;
    }
    showAuthOverlay('loading');
    fbAuth.onAuthStateChanged(async (user) => {
      if (user) {
        state.authUser = user;
        state.authGuest = false;
        hideAuthOverlay();
        await syncOnLogin();
      } else if (wasGuest) {
        state.authGuest = true;
        hideAuthOverlay();
        render();
      } else {
        showAuthOverlay('login');
      }
    });
    // اگه فایربیس خیلی طول بکشه (مثلاً اتصال کند/آفلاینه)، بعد از چند ثانیه مهمانی رو پیشنهاد بده
    setTimeout(() => {
      const overlay = document.getElementById('auth-overlay');
      if (overlay && !overlay.classList.contains('hide') && document.getElementById('auth-loading-box').style.display !== 'none') {
        showAuthOverlay('login');
      }
    }, 6000);
  }

  // --- زبان مقصد یادگیری (جعبه‌ی کلمات/آمار/دسته‌بندی جدا برای هر زبان) ---
  function currentTargetLangCode(){ return LANGUAGE_CODES.includes(state.targetLang) ? state.targetLang : 'de'; }
  function targetLangMeta(code){ return LANGUAGE_META[LANGUAGE_CODES.includes(code) ? code : 'de']; }
  function targetLangLabel(code){ return t('lang_' + (LANGUAGE_CODES.includes(code) ? code : currentTargetLangCode())); }
  // مهاجرت یک‌باره‌ی داده‌های قدیمی (که فقط برای آلمانی بودن) به فضای ذخیره‌سازی جدید مخصوص هر زبان
  function migrateLegacyLanguageDataIfNeeded(){
    try {
      if (localStorage.getItem(TARGET_LANG_MIGRATED_KEY) === '1') return;
      if (!localStorage.getItem(cardsKeyFor('de'))) {
        const oldCards = localStorage.getItem(CARDS_KEY);
        if (oldCards) localStorage.setItem(cardsKeyFor('de'), oldCards);
      }
      if (!localStorage.getItem(statsKeyFor('de'))) {
        const oldStats = localStorage.getItem(STATS_KEY);
        if (oldStats) localStorage.setItem(statsKeyFor('de'), oldStats);
      }
      if (!localStorage.getItem(categoriesKeyFor('de'))) {
        const oldCats = localStorage.getItem(CATEGORIES_KEY);
        if (oldCats) localStorage.setItem(categoriesKeyFor('de'), oldCats);
      }
      localStorage.setItem(TARGET_LANG_MIGRATED_KEY, '1');
    } catch(e){ console.error(e); }
  }
  function loadTargetLang(){
    try {
      const v = localStorage.getItem(TARGET_LANG_KEY);
      state.targetLang = (v && LANGUAGE_CODES.includes(v)) ? v : 'de';
    } catch(e){ state.targetLang = 'de'; }
  }
  function openTargetLangPicker(){ state.showTargetLangModal = true; render(); }
  function closeTargetLangPicker(){ state.showTargetLangModal = false; render(); }
  function switchTargetLang(code){
    if (!LANGUAGE_CODES.includes(code) || code === state.targetLang) { state.showTargetLangModal = false; render(); return; }
    stopListening();
    state.targetLang = code;
    try { localStorage.setItem(TARGET_LANG_KEY, code); } catch(e){}
    loadCards();
    loadCategories();
    loadStats();
    loadCurriculumProgressState();
    ensureCurriculumBootstrapped();
    state.view = 'home';
    state.sessionQueue = []; state.sessionIndex = 0; state.studyType = null;
    state.activeCategoryId = null; state.manageCategoryFilter = 'all'; state.studyCategoryFilter = 'all';
    state.showTargetLangModal = false;
    render();
  }

    de: 'Guten Morgen - صبح بخیر', en: 'Good morning - صبح بخیر', es: 'Buenos días - صبح بخیر',

  };

  function renderTargetLangPicker(){

        <div class="modal-card" onclick="event.stopPropagation()">

  function loadCards(){
    state.cards = [];
    const lang = currentTargetLangCode();
    try {
      const raw = localStorage.getItem(cardsKeyFor(lang));
      if (raw) {
        state.cards = JSON.parse(raw).map(c => ({ ...c, type: c.type === 'sentence' ? 'sentence' : 'word', categoryId: c.categoryId || null }));
      } else if (!localStorage.getItem(cardsSeededKeyFor(lang))) {
        // اولین باری که کاربر وارد این زبان می‌شه و هیچ کارتی نداره، چند کارت نمونه اضافه می‌کنیم
        state.cards = buildDefaultCards(lang);
        try { localStorage.setItem(cardsKeyFor(lang), JSON.stringify(state.cards)); } catch(e2){}
      }
      try { localStorage.setItem(cardsSeededKeyFor(lang), '1'); } catch(e3){}
    } catch(e){ console.error(e); }
  }
  function persistCards(){ try { localStorage.setItem(cardsKeyFor(currentTargetLangCode()), JSON.stringify(state.cards)); } catch(e){ console.error(e); } queueCloudSync(); }
  function loadCategories(){

    try {
      const raw = localStorage.getItem(categoriesKeyFor(currentTargetLangCode()));
      if (raw) state.categories = JSON.parse(raw);
    } catch(e){ console.error(e); }
  }

  function curriculumProgressKeyFor(lang){ return 'leitner_curriculum_progress_v2_' + lang; }
  function defaultCurriculumProgress(){ return { stage: 'A0', correctA1: 0, correctA2: 0, correctB1: 0, unlockedA1Ids: null, categoriesCreated: {} }; }
  function loadCurriculumProgressState(){
    const lang = currentTargetLangCode();
    let prog = defaultCurriculumProgress();
    try {
      const raw = localStorage.getItem(curriculumProgressKeyFor(lang));
      if (raw) {
        const parsed = JSON.parse(raw);
        prog = { ...defaultCurriculumProgress(), ...parsed };
      }
    } catch(e){ console.error(e); }
    state.curriculumProgress[lang] = prog;
  }
  function persistCurriculumProgressState(){
    const lang = currentTargetLangCode();
    try { localStorage.setItem(curriculumProgressKeyFor(lang), JSON.stringify(state.curriculumProgress[lang] || defaultCurriculumProgress())); } catch(e){ console.error(e); }
  }
  function curriculumProgressForLang(){
    const lang = currentTargetLangCode();
    if (!state.curriculumProgress[lang]) state.curriculumProgress[lang] = defaultCurriculumProgress();
    return state.curriculumProgress[lang];
  }
  function loadStats(){
    state.stats = { word: {correct:0, wrong:0}, sentence: {correct:0, wrong:0}, pronun: {correct:0, wrong:0} };
    try {
      const raw = localStorage.getItem(statsKeyFor(currentTargetLangCode()));
      if (raw) {
        const p = JSON.parse(raw);
        state.stats = {
          word: {correct:(p.word&&p.word.correct)||0, wrong:(p.word&&p.word.wrong)||0},
          sentence: {correct:(p.sentence&&p.sentence.correct)||0, wrong:(p.sentence&&p.sentence.wrong)||0},
          pronun: {correct:(p.pronun&&p.pronun.correct)||0, wrong:(p.pronun&&p.pronun.wrong)||0}

      }

  function loadDailyGoals(){

      state.dailyGoals = {
        word: (parsed && Number.isFinite(parsed.word)) ? parsed.word : DEFAULT_DAILY_GOALS.word,
        sentence: (parsed && Number.isFinite(parsed.sentence)) ? parsed.sentence : DEFAULT_DAILY_GOALS.sentence,
        pronun: (parsed && Number.isFinite(parsed.pronun)) ? parsed.pronun : DEFAULT_DAILY_GOALS.pronun,
      };

  }
  function persistDailyGoals(){ try { localStorage.setItem(DAILY_GOALS_KEY, JSON.stringify(state.dailyGoals)); } catch(e){ console.error(e); } }
  function setDailyGoal(type, val){
    const n = Math.max(0, Math.min(999, parseInt(val, 10) || 0));
    state.dailyGoals = { ...state.dailyGoals, [type]: n };
    persistDailyGoals();
    render();
  }

  // --- daily progress (how many correct answers so far today, per section) ---
  function loadDailyProgress(){
    try {
      const raw = localStorage.getItem(DAILY_PROGRESS_KEY);
      const parsed = raw ? JSON.parse(raw) : null;
      state.dailyProgress = (parsed && parsed.date) ? parsed : { date: todayStr(), word: 0, sentence: 0, pronun: 0 };
    } catch(e){ state.dailyProgress = { date: todayStr(), word: 0, sentence: 0, pronun: 0 }; }

  }
  function persistDailyProgress(){ try { localStorage.setItem(DAILY_PROGRESS_KEY, JSON.stringify(state.dailyProgress)); } catch(e){ console.error(e); } }
  function ensureDailyProgressFresh(){
    const t = todayStr();
    if (!state.dailyProgress || state.dailyProgress.date !== t){
      state.dailyProgress = { date: t, word: 0, sentence: 0, pronun: 0 };
      persistDailyProgress();
    }
  }
  function incrementDailyProgress(type){
    ensureDailyProgressFresh();
    state.dailyProgress = { ...state.dailyProgress, [type]: (state.dailyProgress[type] || 0) + 1 };
    persistDailyProgress();
  }
  function decrementDailyProgress(type){
    ensureDailyProgressFresh();
    state.dailyProgress = { ...state.dailyProgress, [type]: Math.max(0, (state.dailyProgress[type] || 0) - 1) };
    persistDailyProgress();
  }

  // --- daily activity tracking (counts app opens + reviews per day; calendar marks a day green as soon as it's visited once) ---
  const DAILY_DONE_THRESHOLD = 2;

      return out;
    }
    if (typeof raw === 'object') return { ...raw };
    return {};
  }
  function loadActivityDays(){

  function persistActivityDays(){ try { localStorage.setItem(ACTIVITY_KEY, JSON.stringify(state.activityDays)); } catch(e){ console.error(e); } queueCloudSync(); }
  function markActivityToday(){

    state.activityDays = { ...state.activityDays, [t]: (state.activityDays[t] || 0) + 1 };
