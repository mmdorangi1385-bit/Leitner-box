  // --- کش پاسخ‌های هوش مصنوعی در IndexedDB ---
  // این کش باعث می‌شه سؤالی که قبلاً یک‌بار پاسخ گرفته، دفعه‌های بعد بدون نیاز به اجرای دوباره مدل در دسترس باشه.
  let offlineDbPromise = null;
  function openOfflineDb(){
    if (offlineDbPromise) return offlineDbPromise;
    offlineDbPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open('leitner_ai_cache_db', 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains('responses')) db.createObjectStore('responses', { keyPath: 'key' });
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return offlineDbPromise;
  }
  function aiCacheKey(kind, input){ return `${kind}::${input}`.slice(0, 500); }
  async function getCachedAiResponse(kind, input){
    try {
      const db = await openOfflineDb();
      return await new Promise((resolve) => {
        const tx = db.transaction('responses', 'readonly');
        const req = tx.objectStore('responses').get(aiCacheKey(kind, input));
        req.onsuccess = () => resolve(req.result ? req.result.value : null);
        req.onerror = () => resolve(null);
      });
    } catch(e){ return null; }
  }
  async function setCachedAiResponse(kind, input, value){
    try {
      const db = await openOfflineDb();
      const tx = db.transaction('responses', 'readwrite');
      tx.objectStore('responses').put({ key: aiCacheKey(kind, input), value, savedAt: Date.now() });
    } catch(e){ console.error('AI cache write failed', e); }
  }

  // مدل همیشه دقیقاً JSON خالص برنمی‌گردونه؛ این تابع تلاش می‌کنه
  // از داخل متنِ خروجی (حتی اگه قبل/بعدش توضیح اضافه باشه) یه JSON معتبر پیدا و پارس کنه.
  function extractJson(text){
    if (!text) return null;
    let raw = String(text).trim().replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/```\s*$/, '').trim();
    try { return JSON.parse(raw); } catch(e){}
    const start = raw.indexOf('{');
    const end = raw.lastIndexOf('}');
    if (start !== -1 && end !== -1 && end > start){
      try { return JSON.parse(raw.slice(start, end + 1)); } catch(e){}
    }
    return null;
  }

  // اجرای یک پرامپت روی OpenRouter (https://openrouter.ai/api/v1/chat/completions) و برگردوندن متن پاسخ
  async function runOpenrouterPrompt(systemPrompt, userPrompt){
    const key = (state.openrouterKey || '').trim();
    if (!key) throw new Error('اول باید کلید OpenRouter رو از تنظیمات وارد کنی.');
    const model = state.openrouterModel || DEFAULT_OPENROUTER_MODEL;
    let res;
    try {
      res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${key}`,
          'Content-Type': 'application/json',
          'HTTP-Referer': window.location.href,
          'X-Title': 'Leitner Box',
        },
        body: JSON.stringify({
          model,
          messages: [
            { role: 'system', content: systemPrompt },
            { role: 'user', content: userPrompt },
          ],
          temperature: 0.6,
        }),
      });
    } catch(e){
      throw new Error('اتصال به OpenRouter برقرار نشد. اینترنتت رو چک کن.');
    }
    if (!res.ok){
      let msg = `خطای OpenRouter (کد ${res.status}).`;
      if (res.status === 401) msg = 'کلید OpenRouter نامعتبره. از تنظیمات دوباره چکش کن.';
      else if (res.status === 402) msg = 'اعتبار حساب OpenRouterت کافی نیست.';
      else if (res.status === 429) msg = 'درخواست‌ها زیاد شده، یه کم صبر کن و دوباره امتحان کن.';
      try {
        const errBody = await res.json();
        if (errBody && errBody.error && errBody.error.message) msg = errBody.error.message;
      } catch(e){}
      throw new Error(msg);
    }
    const data = await res.json();
    const content = data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
    if (!content) throw new Error('پاسخی از مدل دریافت نشد.');
    return content;
  }

  // --- AI fab drag position (mouse + touch, via Pointer Events) ---
  function loadAiFabPos(){
    try {
      const raw = localStorage.getItem(AI_FAB_POS_KEY);
      state.aiFabPos = raw ? JSON.parse(raw) : null;
    } catch(e){ state.aiFabPos = null; }
  }
  function clampFabPos(x, y){
    const size = 58, margin = 6;
    const maxX = Math.max(margin, window.innerWidth - size - margin);
    const maxY = Math.max(margin, window.innerHeight - size - margin);
    return { x: Math.min(Math.max(margin, x), maxX), y: Math.min(Math.max(margin, y), maxY) };
  }
  let aiFabDrag = null;
  let aiFabJustDragged = false;
  function aiFabPointerDown(e){
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    const btn = e.currentTarget;
    const rect = btn.getBoundingClientRect();
    aiFabDrag = { startX: e.clientX, startY: e.clientY, origLeft: rect.left, origTop: rect.top, moved: false, pointerId: e.pointerId };
    try { btn.setPointerCapture(e.pointerId); } catch(err){}
  }
  function aiFabPointerMove(e){
    if (!aiFabDrag || e.pointerId !== aiFabDrag.pointerId) return;
    const dx = e.clientX - aiFabDrag.startX;
    const dy = e.clientY - aiFabDrag.startY;
    if (!aiFabDrag.moved && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) aiFabDrag.moved = true;
    if (!aiFabDrag.moved) return;
    const btn = e.currentTarget;
    const pos = clampFabPos(aiFabDrag.origLeft + dx, aiFabDrag.origTop + dy);
    btn.style.left = pos.x + 'px';
    btn.style.top = pos.y + 'px';
    btn.style.right = 'auto';
    btn.style.bottom = 'auto';
  }
  function aiFabPointerUp(e){
    if (!aiFabDrag || e.pointerId !== aiFabDrag.pointerId) return;
    const btn = e.currentTarget;
    const moved = aiFabDrag.moved;
    try { btn.releasePointerCapture(e.pointerId); } catch(err){}
    if (moved){
      const rect = btn.getBoundingClientRect();
      state.aiFabPos = { x: rect.left, y: rect.top };
      try { localStorage.setItem(AI_FAB_POS_KEY, JSON.stringify(state.aiFabPos)); } catch(err){}
      aiFabJustDragged = true;
    }
    aiFabDrag = null;
  }
  function aiFabClick(e){
    if (aiFabJustDragged){ aiFabJustDragged = false; if (e) e.preventDefault(); return; }
    openAiPage();
  }

  // --- AI chat history (saved automatically per conversation) ---
  function loadAiHistory(){
    try { state.aiHistory = JSON.parse(localStorage.getItem(AI_HISTORY_KEY) || '[]'); } catch(e){ state.aiHistory = []; }
  }
  function persistAiHistory(){
    try { localStorage.setItem(AI_HISTORY_KEY, JSON.stringify(state.aiHistory.slice(0, AI_HISTORY_MAX))); } catch(e){}
  }
  function aiSessionTitle(messages){
    const firstUser = messages.find(m => m.role === 'user');
    const t = firstUser ? firstUser.text.replace(/\s+/g, ' ').trim() : 'گفتگو';
    return t.length > 42 ? t.slice(0, 42) + '…' : (t || 'گفتگو');
  }
  function saveCurrentAiSession(){
    if (!state.aiMessages.length) return;
    if (!state.aiSessionId) state.aiSessionId = `s-${Date.now()}-${Math.random().toString(36).slice(2,7)}`;
    const session = { id: state.aiSessionId, mode: state.aiMode, title: aiSessionTitle(state.aiMessages), messages: state.aiMessages, updatedAt: new Date().toISOString() };
    const idx = state.aiHistory.findIndex(s => s.id === state.aiSessionId);
    if (idx >= 0) state.aiHistory[idx] = session; else state.aiHistory = [session, ...state.aiHistory];
    persistAiHistory();
  }
  function openAiHistoryModal(){ loadAiHistory(); state.showAiHistoryModal = true; render(); }
  function closeAiHistoryModal(){ state.showAiHistoryModal = false; render(); }
  function loadAiHistorySession(id){
    const s = state.aiHistory.find(x => x.id === id);
    if (!s) return;
    state.aiMessages = s.messages;
    state.aiMode = s.mode && AI_MODES[s.mode] ? s.mode : 'chat';
    state.aiSessionId = s.id;
    state.aiError = null;
    state.showAiHistoryModal = false;
    render();
    setTimeout(scrollAiToBottom, 50);
  }
  function deleteAiHistorySession(id, ev){
    if (ev) ev.stopPropagation();
    if (!confirm('این گفتگو حذف بشه؟')) return;
    state.aiHistory = state.aiHistory.filter(s => s.id !== id);
    persistAiHistory();
    if (state.aiSessionId === id){ state.aiMessages = []; state.aiSessionId = null; }
    render();
  }
  function formatHistoryDate(iso){
    try {
      const d = new Date(iso);
      return faNum(d.toLocaleDateString('fa-IR')) + ' - ' + faNum(d.toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' }));
    } catch(e){ return ''; }
  }

  function openAiPage(){
    stopListening();
    loadAiHistory();
    state.aiOpen = true;
    render();
    setTimeout(scrollAiToBottom, 50);
  }
  function closeAiPage(){ state.aiOpen = false; render(); }

  // دکمه‌ی «👨‍🏫 از معلم بپرس» کنار کارت — یه گفتگوی جدید و مخصوص همین کلمه/جمله باز می‌کنه
  function openAskTeacher(cardId){
    const card = state.cards.find(c => c.id === cardId);
    state.aiTeacherCard = card ? { de: card.de, fa: card.fa, type: card.type } : null;
    state.aiMode = 'teacher';
    state.aiMessages = [];
    state.aiSessionId = null;
    state.aiError = null;
    openAiPage();
  }
  function askTeacherQuick(q){
    const ctx = state.aiTeacherCard;
    const prefix = ctx ? `درباره‌ی این ${typeLabel(ctx.type)}: «${ctx.de}» (${ctx.fa})\n` : '';
    sendAiMessage(prefix + q);
  }

  function setAiMode(mode){
    state.aiMode = mode;
    state.aiError = null;
    if (mode !== 'teacher') state.aiTeacherCard = null;
    render();
    const ta = document.getElementById('aiInput');
    if (ta) ta.focus();
    if (mode === 'suggest') sendAiMessage('چند جمله کاربردی آلمانی برام پیشنهاد بده.');
    if (mode === 'practice' && state.aiMessages.length === 0) sendAiMessage('بیا شروع کنیم، یه گفتگوی ساده آلمانی باهام شروع کن.');
  }

  function syncAiInput(){ const ta = document.getElementById('aiInput'); if (ta) state.aiInput = ta.value; }

  function handleAiInputKeydown(e){
    if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendAiMessage(); }
  }

  async function sendAiMessage(presetText){
    syncAiInput();
    const text = (typeof presetText === 'string' ? presetText : state.aiInput).trim();
    if (!text) return;
    const modeCfg = AI_MODES[state.aiMode] || AI_MODES.chat;
    state.aiMessages = [...state.aiMessages, { role: 'user', text }];
    state.aiInput = '';
    state.aiLoading = true;
    state.aiError = null;
    render();
    scrollAiToBottom();

    // پاسخ قبلاً یک‌بار برای همین سوال (در همین حالت) گرفته شده؟ از کش بیار، حتی بدون اینترنت.
    const cacheKind = `mode:${state.aiMode}`;
    const cached = await getCachedAiResponse(cacheKind, text);
    if (cached){
      state.aiMessages = [...state.aiMessages, { role: 'model', text: cached, cached: true }];
      state.aiLoading = false;
      saveCurrentAiSession();
      render();
      scrollAiToBottom();
      return;
    }

    let replyText = null;

    if (hasOpenrouterKey()){
      try { replyText = await runOpenrouterPrompt(modeCfg.system, text); }
      catch(e){ state.aiError = (e && e.message) || 'ارتباط با OpenRouter برقرار نشد. دوباره امتحان کن.'; }
    } else {
      state.aiError = 'اول باید کلید OpenRouter رو از تنظیمات وارد کنی، بعدش دستیار همیشه در دسترسه.';
    }

    if (replyText){
      state.aiMessages = [...state.aiMessages, { role: 'model', text: replyText }];
      setCachedAiResponse(cacheKind, text, replyText);
    }
    state.aiLoading = false;
    saveCurrentAiSession();
    render();
    scrollAiToBottom();
  }


  function scrollAiToBottom(){
    const el = document.getElementById('aiMessages');
    if (el) el.scrollTop = el.scrollHeight;
  }

  function copyAiMessage(i){
    const m = state.aiMessages[i];
    if (!m) return;
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(m.text).catch(() => {});
    }
  }

  function clearAiChat(){
    if (state.aiMessages.length && !confirm('گفتگوی فعلی پاک بشه؟ (توی تاریخچه می‌مونه)')) return;
    state.aiMessages = [];
    state.aiError = null;
    state.aiSessionId = null;
    render();
  }

  // --- AI example-sentence generator (جعبه کلمه) ---
  function renderAiSentenceSection(card){
    const matches = state.aiSentenceCardId === card.id;
    const result = matches ? state.aiSentenceResult : null;
    const error = matches ? state.aiSentenceError : null;
    const loading = matches && state.aiSentenceLoading;
    return `
      <div class="ai-sentence-box">
        ${!result ? `<button class="ai-sentence-btn" onclick="generateAiExample()" ${loading?'disabled':''}>${loading ? '✨ در حال ساختن جمله...' : '✨ تولید جمله با AI'}</button>` : ''}
        ${error ? `<div class="ai-sentence-error">${esc(error)}</div>` : ''}
        ${result ? `
          <div class="ai-sentence-result">
            <div class="ai-sentence-label">جمله پیشنهادی AI</div>
            <div class="ai-sentence-de">${esc(result.example)}</div>
            <div class="ai-sentence-label" style="margin-top:10px">معنی</div>
            <div class="ai-sentence-fa">${esc(result.meaning)}</div>
            <div class="ai-sentence-actions">
              <button class="speak-icon-btn" onclick="speakAiSentence()">${icon('volume',14)} شنیدن</button>
              <button class="link-btn" style="margin:0" onclick="generateAiExample()">✨ جمله دیگه</button>
            </div>
          </div>
        ` : ''}
      </div>
    `;
  }
  async function generateAiExample(){
    const cardId = state.sessionQueue[state.sessionIndex];
    const card = state.cards.find(c => c.id === cardId);
    if (!card) return;
    state.aiSentenceCardId = card.id;
    state.aiSentenceLoading = true;
    state.aiSentenceError = null;
    state.aiSentenceResult = null;
    render();
    try {
      if (!hasOpenrouterKey()) throw new Error('اول باید کلید OpenRouter رو از تنظیمات وارد کنی.');
      const system = 'تو فقط و فقط با یک آبجکت JSON خالص جواب می‌دی، بدون هیچ توضیح یا Markdown اضافه، دقیقاً با همین ساختار: {"example": "...", "meaning": "..."}';
      const prompt = `کلمه: "${card.de}"\nمعنی فارسی این کلمه: "${card.fa}"\nبا همین کلمه یک جمله طبیعی، روان و کاربردی به همون زبانِ کلمه (زبانی که کلمه بهش نوشته شده) بنویس؛ جمله باید بین ۱۰ تا ۱۵ کلمه باشه، نه خیلی کوتاه نه خیلی بلند، و مناسب یادگیری زبان باشه. سپس معنی کامل و روانِ همون جمله رو به فارسی بنویس.`;
      const replyText = await runOpenrouterPrompt(system, prompt);
      if (!replyText) throw new Error('جوابی دریافت نشد، دوباره امتحان کن.');
      const parsed = extractJson(replyText);
      if (!parsed || !parsed.example) throw new Error('پاسخ هوش مصنوعی قابل خواندن نبود، دوباره امتحان کن.');
      if (state.aiSentenceCardId === card.id){
        state.aiSentenceResult = { example: String(parsed.example).trim(), meaning: String(parsed.meaning || '').trim() };
      }
    } catch(e){
      if (state.aiSentenceCardId === card.id){
        state.aiSentenceError = (e && e.message) || 'ارتباط با هوش مصنوعی برقرار نشد. اتصال اینترنتت رو چک کن.';
      }
    }
    if (state.aiSentenceCardId === card.id) state.aiSentenceLoading = false;
    render();
  }
  function speakAiSentence(){
    if (state.aiSentenceResult && state.aiSentenceResult.example) speak(state.aiSentenceResult.example);
  }

  // --- AI explanation generator (جعبه جمله) ---
  function renderAiExplainSection(card){
    const matches = state.aiExplainCardId === card.id;
    const result = matches ? state.aiExplainResult : null;
    const error = matches ? state.aiExplainError : null;
    const loading = matches && state.aiExplainLoading;
    return `
      <div class="ai-sentence-box">
        ${!result ? `<button class="ai-sentence-btn" onclick="generateAiExplain()" ${loading?'disabled':''}>${loading ? '✨ در حال آماده‌سازی توضیح...' : '✨ توضیح با AI'}</button>` : ''}
        ${error ? `<div class="ai-sentence-error">${esc(error)}</div>` : ''}
        ${result ? `
          <div class="ai-sentence-result">
            <div class="ai-sentence-label">معنی و مفهوم جمله</div>

            ${result.grammar ? `
              <div class="ai-sentence-label" style="margin-top:10px">نکات گرامری</div>

            ${result.vocab && result.vocab.length ? `
              <div class="ai-sentence-label" style="margin-top:10px">کلمات مهم</div>
              <div class="ai-explain-vocab">
                ${result.vocab.map(v => `<div class="ai-explain-vocab-item"><span class="ai-explain-vocab-word">${esc(v.word)}</span><span class="ai-explain-vocab-meaning">${esc(v.meaning)}</span></div>`).join('')}
              </div>
            ` : ''}
            ${result.similar ? `
              <div class="ai-sentence-label" style="margin-top:10px">جمله مشابه</div>
              <div class="ai-sentence-de">${esc(result.similar.sentence)}</div>
              ${result.similar.meaning ? `<div class="ai-sentence-fa" style="margin-top:4px">${esc(result.similar.meaning)}</div>` : ''}
              <button class="speak-icon-btn" style="margin-top:6px" onclick="speakAiExplainSimilar()">${icon('volume',14)} شنیدن</button>
            ` : ''}
            <div class="ai-sentence-actions">
              <button class="link-btn" style="margin:0" onclick="generateAiExplain()">✨ توضیح دوباره</button>
            </div>
          </div>
        ` : ''}
      </div>
    `;
  }
  async function generateAiExplain(){
    const cardId = state.sessionQueue[state.sessionIndex];
    const card = state.cards.find(c => c.id === cardId);
    if (!card) return;
    state.aiExplainCardId = card.id;
    state.aiExplainLoading = true;
    state.aiExplainError = null;
    state.aiExplainResult = null;
    render();
    try {
      if (!hasOpenrouterKey()) throw new Error('اول باید کلید OpenRouter رو از تنظیمات وارد کنی.');
      const system = 'تو فقط و فقط با یک آبجکت JSON خالص جواب می‌دی، بدون هیچ توضیح یا Markdown اضافه، دقیقاً با همین ساختار: {"meaning": "...", "grammar": "...", "vocab": [{"word": "...", "meaning": "..."}], "similar": {"sentence": "...", "meaning": "..."} یا null}';
      const prompt = `جمله: "${card.de}"\nمعنی فارسی این جمله: "${card.fa}"\nدرباره این جمله برای فارسی‌زبانی که داره زبانِ این جمله رو یاد می‌گیره توضیح بده:\n۱) معنی و مفهوم کامل جمله رو به فارسیِ روان توضیح بده (نه فقط ترجمه کلمه به کلمه، بلکه مفهومش رو هم باز کن).\n۲) نکات مهم گرامری جمله (ساختار، زمان فعل، حالت و مواردی که یادگیرنده باید بدونه) رو کوتاه و کاربردی به فارسی بنویس.\n۳) مهم‌ترین کلمات یا عبارات جمله (حداکثر ۵ تا) رو با معنی فارسیشون فهرست کن.\n۴) فقط در صورتی که واقعاً کمک‌کننده باشه، یک جمله مشابه دیگه (با ساختار یا واژگان نزدیک) به همون زبان جمله بساز و معنی فارسیش رو هم بده؛ اگه لازم نیست این بخش رو null بذار.`;
      const replyText = await runOpenrouterPrompt(system, prompt);
      if (!replyText) throw new Error('جوابی دریافت نشد، دوباره امتحان کن.');
      const parsed = extractJson(replyText);
      if (!parsed || !parsed.meaning) throw new Error('پاسخ هوش مصنوعی قابل خواندن نبود، دوباره امتحان کن.');
      if (state.aiExplainCardId === card.id){
        const vocab = Array.isArray(parsed.vocab)
          ? parsed.vocab.filter(v => v && v.word).slice(0, 6).map(v => ({ word: String(v.word).trim(), meaning: String(v.meaning || '').trim() }))
          : [];
        const similar = (parsed.similar && parsed.similar.sentence)
          ? { sentence: String(parsed.similar.sentence).trim(), meaning: String(parsed.similar.meaning || '').trim() }
          : null;
        state.aiExplainResult = { meaning: String(parsed.meaning).trim(), grammar: String(parsed.grammar || '').trim(), vocab, similar };
      }
    } catch(e){
      if (state.aiExplainCardId === card.id){
        state.aiExplainError = (e && e.message) || 'ارتباط با هوش مصنوعی برقرار نشد. اتصال اینترنتت رو چک کن.';
      }
    }
    if (state.aiExplainCardId === card.id) state.aiExplainLoading = false;
    render();
  }
  function speakAiExplainSimilar(){
    if (state.aiExplainResult && state.aiExplainResult.similar && state.aiExplainResult.similar.sentence) speak(state.aiExplainResult.similar.sentence);
  }

  function renderAiFab(){
    const posStyle = state.aiFabPos ? `left:${state.aiFabPos.x}px;top:${state.aiFabPos.y}px;right:auto;bottom:auto;` : '';
    return `
      <button id="aiFabBtn" class="ai-fab" style="${posStyle}"
        onpointerdown="aiFabPointerDown(event)" onpointermove="aiFabPointerMove(event)"
        onpointerup="aiFabPointerUp(event)" onpointercancel="aiFabPointerUp(event)"

        ${icon('ai', 24)}
      </button>
    `;

  function renderAiPage(){
    const modeCfg = AI_MODES[state.aiMode] || AI_MODES.chat;
    const ctx = state.aiMode === 'teacher' ? state.aiTeacherCard : null;
    return `
      <div class="ai-page">
        <div class="ai-page-header">
          <button class="ai-back-btn" onclick="closeAiPage()" aria-label="بازگشت">${icon('close', 18)}</button>
          <div class="ai-page-title">${icon('ai', 17)} ${ctx ? 'از معلم بپرس' : 'دستیار هوشمند'}</div>
          ${state.aiMessages.length ? `<button class="ai-clear-btn" onclick="clearAiChat()" title="گفتگوی جدید">${icon('trash', 16)}</button>` : ''}
          <button class="ai-history-btn" onclick="openAiHistoryModal()" title="گفتگوهای قبلی">${icon('history', 16)}</button>
        </div>
        ${ctx ? `<div class="hint-text" style="margin:0 16px 10px">درباره‌ی ${typeLabel(ctx.type)}: <b style="color:var(--text)">${esc(ctx.de)}</b> — ${esc(ctx.fa)}</div>` : ''}
        <div class="ai-quick-row">
          ${Object.keys(AI_MODES).filter(k => k !== 'chat').map(k => `<button class="ai-quick-chip ${state.aiMode===k?'active':''}" onclick="setAiMode('${k}')">${esc(AI_MODES[k].label)}</button>`).join('')}
        </div>
        ${ctx ? `<div class="ai-quick-row">
          ${TEACHER_QUICK_QUESTIONS.map(t => `<button class="ai-quick-chip" onclick="askTeacherQuick('${esc(t.q).replace(/'/g,"&#39;")}')">${esc(t.label)}</button>`).join('')}
        </div>` : ''}
        <div class="ai-messages" id="aiMessages">
          ${state.aiMessages.length === 0 ? `<div class="ai-empty">${icon('ai', 26)}<div>${ctx ? 'یکی از سوال‌های بالا رو بزن یا خودت هرچی می‌خوای بپرس.' : 'سلام! من دستیار هوشمند این اپم.<br>می‌تونی سوال بپرسی، متن ترجمه کنی، گرامر یاد بگیری، تمرین زبان کنی یا جمله پیشنهادی بگیری.'}</div></div>` : ''}
          ${state.aiMessages.map((m, i) => renderAiMessage(m, i)).join('')}
          ${state.aiLoading ? `<div class="ai-msg ai-msg-model"><span class="ai-typing-dots"><span></span><span></span><span></span></span></div>` : ''}
        </div>
        ${state.aiError ? `<div class="preview-warn" style="margin:0 10px 8px">${esc(state.aiError)}</div>` : ''}
        <div class="ai-input-row">

  function renderAiMessage(m, i){
    const cls = m.role === 'user' ? 'ai-msg-user' : 'ai-msg-model';
    return `
      <div class="ai-msg ${cls}">
        <div>${esc(m.text)}</div>

        ${m.role === 'model' ? `<div class="ai-msg-copy"><button onclick="copyAiMessage(${i})">${icon('copy', 12)} کپی</button></div>` : ''}
      </div>
    `;
  }

  function renderAiHistoryModal(){
    if (!state.showAiHistoryModal) return '';
    const sessions = state.aiHistory;
    return `
      <div class="modal-backdrop" onclick="closeAiHistoryModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
          <div class="deck-header" style="margin-bottom:10px">
            <span class="deck-title">گفتگوهای قبلی</span>
            <button class="modal-close-btn" onclick="closeAiHistoryModal()">${icon('close', 15)}</button>
          </div>
          ${sessions.length === 0 ? `<div class="ai-history-empty">هنوز گفتگویی ذخیره نشده.</div>` : `
            <div class="ai-history-list">
              ${sessions.map(s => `
                <div class="ai-history-item ${s.id===state.aiSessionId?'active':''}" onclick="loadAiHistorySession('${s.id}')">
                  <div class="ai-history-item-main">
                    <div class="ai-history-item-title">${esc(s.title)}</div>
                    <div class="ai-history-item-meta">${esc(AI_MODES[s.mode] ? AI_MODES[s.mode].label : 'چت آزاد')} · ${formatHistoryDate(s.updatedAt)}</div>
                  </div>
                  <button class="ai-history-item-del" onclick="deleteAiHistorySession('${s.id}', event)" aria-label="حذف">${icon('trash', 14)}</button>
                </div>
              `).join('')}
            </div>
          `}
        </div>
      </div>
    `;
  }

  // navigation
  function goHome(){ stopListening(); state.view='home'; state.activeCategoryId=null; render(); }
  function goAdd(){ stopListening(); state.view='add'; state.preview=null; render(); }
  function goTranslate(){ stopListening(); state.view='translate'; state.translateError=null; render(); }
  function goStudyTab(){ stopListening(); state.view='study'; state.studyType=null; state.sessionQueue=[]; state.lastAction=null; render(); }
  function goStats(){ stopListening(); state.view='stats'; render(); }
  function goManage(){ stopListening(); state.view='manage'; state.confirmDeleteId=null; state.editingId=null; render(); }
  function goSettings(){ stopListening(); state.view='settings'; render(); }
  function syncInputText(){ const ta = document.getElementById('addTextarea'); if (ta) state.inputText = ta.value; }
  function setAddType(t){ syncInputText(); state.addType = t; state.addSearchQuery = ''; render(); }
  function setAddCategory(v){ state.addCategoryId = v; }
  function toggleNewCategoryInput(){ syncInputText(); state.showNewCategoryInput = !state.showNewCategoryInput; render(); }
  function addCategoryFromInput(){
    syncInputText();
    const input = document.getElementById('newCategoryInput');
    const name = input ? input.value.trim() : '';
    if (!name) return;
    const cat = { id: `cat-${Date.now()}-${Math.random().toString(36).slice(2,7)}`, name, createdAt: new Date().toISOString() };
    state.categories = [...state.categories, cat];
    persistCategories();
    state.addCategoryId = cat.id;
    state.showNewCategoryInput = false;
    render();
  }
  function addCategoryFromSettings(){
    const input = document.getElementById('settingsNewCat');
    const name = input ? input.value.trim() : '';
    if (!name) return;
    const cat = { id: `cat-${Date.now()}-${Math.random().toString(36).slice(2,7)}`, name, createdAt: new Date().toISOString() };
    state.categories = [...state.categories, cat];
    persistCategories();
    render();
  }
  function deleteCategory(id){
    state.categories = state.categories.filter(c=>c.id!==id);
    state.cards = state.cards.map(c => c.categoryId===id ? {...c, categoryId:null} : c);
    persistCards(); persistCategories();
    render();
  }
  function setManageFilter(t){ state.manageFilter = t; state.confirmDeleteId=null; state.editingId=null; render(); }
  function setManageCategoryFilter(v){ state.manageCategoryFilter = v; state.confirmDeleteId=null; state.editingId=null; render(); }
  function askEdit(id){ state.confirmDeleteId=null; state.editingId=id; render(); }
  function cancelEdit(){ state.editingId=null; render(); }
  function saveEdit(id){
    const deEl = document.getElementById(`editDe-${id}`);
    const faEl = document.getElementById(`editFa-${id}`);
    const catEl = document.getElementById(`editCat-${id}`);
    const de = deEl ? deEl.value.trim() : '';
    const fa = faEl ? faEl.value.trim() : '';
    if (!de || !fa) { alert('هر دو بخش آلمانی و فارسی باید پر باشه.'); return; }
    const catVal = catEl ? catEl.value : 'none';
    const categoryId = catVal==='none' ? null : catVal;
    state.cards = state.cards.map(c => c.id===id ? {...c, de, fa, categoryId} : c);
    persistCards();
    state.editingId = null;
    render();
  }

  async function toggleReminders(){
    if (state.remindersEnabled) {
      state.remindersEnabled = false;
      localStorage.setItem(REMIND_KEY, '0');
      stopReminderWatcher();
      render();
      return;
    }
    if (!('Notification' in window)) { alert('این مرورگر نوتیفیکیشن رو پشتیبانی نمی‌کنه.'); return; }
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') { alert('اجازه نوتیفیکیشن داده نشد.'); return; }
    state.remindersEnabled = true;
    localStorage.setItem(REMIND_KEY, '1');
    if (!state.reminderTime) state.reminderTime = '09:00';
    try { localStorage.setItem(REMINDER_TIME_KEY, state.reminderTime); } catch(e){}
    try {
      if ('serviceWorker' in navigator) {
        const reg = await navigator.serviceWorker.ready;
        if ('periodicSync' in reg) {
          try {
            const status = await navigator.permissions.query({ name: 'periodic-background-sync' });
            if (status.state === 'granted') {
              await reg.periodicSync.register('leitner-daily-reminder', { minInterval: 24*60*60*1000 });
            }
          } catch(e) { /* not supported on this browser, that's fine */ }
        }
      }
    } catch(e){ console.error(e); }
    startReminderWatcher();
    render();
  }

  function setReminderTime(val){
    if (!val) return;
    state.reminderTime = val;
    try { localStorage.setItem(REMINDER_TIME_KEY, val); } catch(e){}
    try { localStorage.removeItem(REMINDER_LAST_FIRED_KEY); } catch(e){}
    render();
  }

  // --- foreground alarm watcher: checks every 20s while the app is open/in background tab ---
  let reminderIntervalHandle = null;
  function startReminderWatcher(){
    stopReminderWatcher();
    checkReminderTime();
    reminderIntervalHandle = setInterval(checkReminderTime, 20000);
  }
  function stopReminderWatcher(){
    if (reminderIntervalHandle){ clearInterval(reminderIntervalHandle); reminderIntervalHandle = null; }
  }
  function checkReminderTime(){
    if (!state.remindersEnabled || !state.reminderTime) return;
    const now = new Date();
    const cur = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    if (cur !== state.reminderTime) return;
    const today = todayStr();
    let lastFired = null;
    try { lastFired = localStorage.getItem(REMINDER_LAST_FIRED_KEY); } catch(e){}
    if (lastFired === today) return;
    try { localStorage.setItem(REMINDER_LAST_FIRED_KEY, today); } catch(e){}
    fireReminderAlarm();
  }
  async function fireReminderAlarm(){
    playAlarmSound();
    if (navigator.vibrate) { try { navigator.vibrate([300,150,300,150,300]); } catch(e){} }
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    try {
      if ('serviceWorker' in navigator) {
        const reg = await navigator.serviceWorker.ready;
        reg.showNotification('جعبه لایتنر', { body: REMINDER_MESSAGE, icon: 'icon-192.png', badge: 'icon-192.png', vibrate: [300,150,300] });
      } else {
        new Notification('جعبه لایتنر', { body: REMINDER_MESSAGE, icon: 'icon-192.png' });
      }
    } catch(e){}
  }
  function playAlarmSound(){
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      const ctx = new Ctx();
      const now = ctx.currentTime;
      [0, 0.35, 0.7].forEach((t, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = i % 2 === 0 ? 880 : 660;
        gain.gain.setValueAtTime(0.0001, now + t);
        gain.gain.exponentialRampToValueAtTime(0.3, now + t + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + t + 0.3);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(now + t); osc.stop(now + t + 0.32);
      });
    } catch(e){}
  }

  function parsePreview(){
    const ta = document.getElementById('addTextarea');
    state.inputText = ta ? ta.value : '';
    state.preview = parseInput(state.inputText);
    render();
  }
  function cancelPreview(){ state.preview = null; render(); }
  function confirmAdd(){
    if (!state.preview || state.preview.parsed.length===0) return;
    const now = new Date().toISOString();
    const today = todayStr();
    const categoryId = (state.addCategoryId && state.addCategoryId !== 'none') ? state.addCategoryId : null;
    const newCards = state.preview.parsed.map((p,i) => ({
      id: `${Date.now()}-${i}-${Math.random().toString(36).slice(2,7)}`,
      de: p.de, fa: p.fa, box: 1, nextReview: today, createdAt: now, type: state.addType, categoryId
    }));
    state.cards = [...state.cards, ...newCards];
    persistCards();
    state.inputText=''; state.preview=null; state.view='home';
    render();
  }

  function askDelete(id){ state.confirmDeleteId=id; render(); }
  function cancelDelete(){ state.confirmDeleteId=null; render(); }
  function doDelete(id){ state.cards = state.cards.filter(c=>c.id!==id); persistCards(); state.confirmDeleteId=null; render(); }

  function startSession(type){
    state.studyType = type;
    state.lastAction = null;
    state.pronunAttempt = 0;
    state.pronunFeedback = null;
    state.pronunHeard = '';
    state.pronunListening = false;
    if (type === 'pronun'){
      const pool = state.cards.filter(c => matchesCategory(c, state.studyCategoryFilter));
      state.sessionQueue = shuffle(pool).map(c=>c.id);
    } else {
      const today = todayStr();
      const due = state.cards.filter(c => c.type===type && c.nextReview <= today && matchesCategory(c, state.studyCategoryFilter));
      const sorted = shuffle(due).sort((a,b) => a.box - b.box);
      state.sessionQueue = sorted.map(c=>c.id);
    }
    state.sessionIndex = 0;
    state.sessionStats = { correct:0, wrong:0 };
    state.revealed = false;
    state.aiSentenceCardId = null;
    state.aiSentenceResult = null;
    state.aiSentenceError = null;
    state.aiSentenceLoading = false;
    state.aiExplainCardId = null;
    state.aiExplainResult = null;
    state.aiExplainError = null;
    state.aiExplainLoading = false;
    state.view = 'study';
    render();
  }
  function pronunNext(){
    stopListening();
    state.sessionIndex += 1;
    state.pronunAttempt = 0;
    state.pronunFeedback = null;
    state.pronunHeard = '';
    render();
  }
  function reveal(){
    const cardId = state.sessionQueue[state.sessionIndex];
    const card = state.cards.find(c => c.id === cardId);
    state.revealed = true;
    render();
    if (card) speak(card.de);
  }
  function answer(correct){
    const today = todayStr();
    const cardId = state.sessionQueue[state.sessionIndex];
    const card = state.cards.find(c => c.id === cardId);
    if (!card) return;
    const prevBox = card.box;
    const prevNextReview = card.nextReview;
    const newBox = correct ? Math.min(card.box+1, 5) : 1;
    const newNextReview = addDays(today, BOX_INTERVALS[newBox]);
    state.cards = state.cards.map(c => c.id===card.id ? {...c, box:newBox, nextReview:newNextReview} : c);
    persistCards();
    const t = card.type;
    state.stats[t].correct += correct ? 1 : 0;
    state.stats[t].wrong += correct ? 0 : 1;
    persistStats();
    if (correct) incrementDailyProgress(t);
    state.sessionStats = { correct: state.sessionStats.correct+(correct?1:0), wrong: state.sessionStats.wrong+(correct?0:1) };
    state.lastAction = { cardId: card.id, prevBox, prevNextReview, correct, type: t, sessionIndex: state.sessionIndex };
    state.revealed = false;
    state.sessionIndex += 1;
    render();
  }
  function undoLastAnswer(){
    const a = state.lastAction;
    if (!a) return;
    state.cards = state.cards.map(c => c.id===a.cardId ? {...c, box:a.prevBox, nextReview:a.prevNextReview} : c);
    persistCards();
    state.stats[a.type].correct -= a.correct ? 1 : 0;
    state.stats[a.type].wrong -= a.correct ? 0 : 1;
    persistStats();
    if (a.correct) decrementDailyProgress(a.type);
    state.sessionStats = { correct: state.sessionStats.correct-(a.correct?1:0), wrong: state.sessionStats.wrong-(a.correct?0:1) };
    state.sessionIndex = a.sessionIndex;
    state.revealed = true;
    state.lastAction = null;
    render();
  }

  function resetAllData(){
    if (!confirm('همه کارت‌ها، آمار، دسته‌بندی‌ها و تقویم مرور پاک می‌شن. قبلش یه نسخه پشتیبان ازت گرفته می‌شه. ادامه بدیم؟')) return;
    exportBackup();
    if (!confirm('پشتیبان گرفته شد (توی کلیپ‌بورد کپی شده یا نمایش داده شد؛ یه جای امن نگه‌ش دار). مطمئنی می‌خوای الان همه چیز پاک بشه؟ این کار قابل بازگشت نیست.')) return;
    state.cards = [];
    state.categories = [];
    state.stats = { word:{correct:0,wrong:0}, sentence:{correct:0,wrong:0}, pronun:{correct:0,wrong:0} };
    state.activityDays = {};
    try {
      localStorage.setItem(CARDS_KEY, JSON.stringify(state.cards));
      localStorage.setItem(CATEGORIES_KEY, JSON.stringify(state.categories));
      localStorage.setItem(STATS_KEY, JSON.stringify(state.stats));
      localStorage.setItem(ACTIVITY_KEY, JSON.stringify(state.activityDays));
    } catch(e){ console.error(e); }
    queueCloudSync();
    state.view = 'home';
    state.activeCategoryId = null;
    alert('حافظه جعبه لایتنر پاک شد.');
    render();
  }
  function exportBackup(){
    const json = JSON.stringify({ cards: state.cards, stats: state.stats, categories: state.categories, activityDays: state.activityDays });
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(json).then(() => alert('کپی شد. یه جای امن (مثلاً نوت‌ها) نگهش دار.')).catch(() => prompt('این متن رو کپی کن و یه جا نگه دار:', json));
    } else {
      prompt('این متن رو کپی کن و یه جا نگه دار:', json);
    }
  }
  function toggleImport(){ state.showImport = !state.showImport; render(); }
  function doImport(){
    const ta = document.getElementById('importTextarea');
    if (!ta) return;
    try {
      const parsed = JSON.parse(ta.value);
      let cards, stats, categories;
      if (Array.isArray(parsed)) { cards = parsed; stats = state.stats; categories = state.categories; }
      else { cards = parsed.cards || []; stats = parsed.stats || state.stats; categories = parsed.categories || state.categories; }
      state.cards = cards.map(c => ({ ...c, type: c.type==='sentence' ? 'sentence' : 'word', categoryId: c.categoryId || null }));
      state.stats = {
        word: {correct:(stats.word&&stats.word.correct)||0, wrong:(stats.word&&stats.word.wrong)||0},
        sentence: {correct:(stats.sentence&&stats.sentence.correct)||0, wrong:(stats.sentence&&stats.sentence.wrong)||0},
        pronun: {correct:(stats.pronun&&stats.pronun.correct)||0, wrong:(stats.pronun&&stats.pronun.wrong)||0}
      };
      state.categories = Array.isArray(categories) ? categories : [];
      if (!Array.isArray(parsed) && parsed.activityDays) state.activityDays = normalizeActivityDays(parsed.activityDays);
      persistCards(); persistStats(); persistCategories(); persistActivityDays();
      state.showImport = false;
      render();
      alert('بازیابی شد.');
    } catch(e){ alert('این متن معتبر نیست.'); }
  }

  // --- translate (DE <-> FA) ---
  function syncTranslateInput(){ const ta = document.getElementById('translateInput'); if (ta) state.translateInput = ta.value; }
  async function runTranslate(){
    syncTranslateInput();
    const text = state.translateInput.trim();
    if (!text) return;
    const isFa = /[\u0600-\u06FF]/.test(text);
    const targetLang = isFa ? 'de' : 'fa';
    state.translateLoading = true;
    state.translateError = null;
    state.translateResult = null;
    render();
    try {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('bad-response');
      const data = await res.json();
      const translated = (data && data[0]) ? data[0].map(seg => seg[0]).join('') : '';
      if (!translated) throw new Error('empty');
      state.translateResult = translated;
      state.translateIsToDe = targetLang === 'de';
    } catch(e){
      state.translateError = 'ترجمه انجام نشد. اتصال اینترنتت رو چک کن و دوباره امتحان کن.';
    }
    state.translateLoading = false;
    render();
  }
  function speakTranslateResult(){
    const deText = state.translateIsToDe ? state.translateResult : state.translateInput.trim();
    if (deText) speak(deText);
  }
  function addTranslationAsCard(){
    if (!state.translateResult) return;
    const de = (state.translateIsToDe ? state.translateResult : state.translateInput).trim();
    state.translateTypeChoice = de.split(/\s+/).length > 2 ? 'sentence' : 'word';
    state.showTranslateTypeModal = true;
    render();
  }
  function closeTranslateTypeModal(){ state.showTranslateTypeModal = false; render(); }
  function setTranslateType(v){ state.translateTypeChoice = v; render(); }
  function confirmAddTranslationAsCard(){
    if (!state.translateResult) return;
    const de = (state.translateIsToDe ? state.translateResult : state.translateInput).trim();
    const fa = (state.translateIsToDe ? state.translateInput : state.translateResult).trim();
    if (!de || !fa) return;
    const now = new Date().toISOString();
    const today = todayStr();
    const type = state.translateTypeChoice === 'sentence' ? 'sentence' : 'word';
    const card = { id: `${Date.now()}-${Math.random().toString(36).slice(2,7)}`, de, fa, box: 1, nextReview: today, createdAt: now, type, categoryId: null };
    state.cards = [...state.cards, card];
    persistCards();
    state.showTranslateTypeModal = false;
    alert('به جعبه لایتنر اضافه شد.');
    render();
  }

  loadCards();
  loadStats();
  loadCategories();
  loadThemeColor();
  loadThemeMode();
  loadReminderState();
  loadActivityDays();
  markActivityToday();
  loadAiFabPos();
  loadAiHistory();
  loadDailyGoals();
  loadDailyProgress();
  loadOpenrouterConfig();
  render();

  window.addEventListener('resize', () => {
    if (!state.aiFabPos) return;
    const pos = clampFabPos(state.aiFabPos.x, state.aiFabPos.y);
    state.aiFabPos = pos;
    try { localStorage.setItem(AI_FAB_POS_KEY, JSON.stringify(pos)); } catch(e){}
    const btn = document.getElementById('aiFabBtn');
    if (btn){ btn.style.left = pos.x + 'px'; btn.style.top = pos.y + 'px'; btn.style.right = 'auto'; btn.style.bottom = 'auto'; }
  });
  checkMicPermission().then(() => render());
  whenGoogleReady(silentGoogleReauth);

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((e) => console.error('SW registration failed', e));
    });
  }

  window.addEventListener('load', () => {
    setTimeout(() => {
      const el = document.getElementById('splash');
      if (el) { el.classList.add('hide'); setTimeout(() => el.remove(), 500); }
    }, 6200);
  });
</script>
